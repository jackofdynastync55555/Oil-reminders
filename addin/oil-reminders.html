<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Oil Change Reminders</title>
</head>
<body style="margin:0; font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif; background:#f5f6f8; color:#16202b; font-size:14px; line-height:1.4;">
<div style="max-width:860px; margin:0 auto; padding:24px 20px 56px;">
  <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:4px;">
    <div>
      <div style="font-size:22px; font-weight:700; letter-spacing:-0.02em;">Oil Change Reminders</div>
      <div style="color:#64748b; margin-top:4px; font-size:13px;">Distance-based reminders that reset themselves. No work orders to close.</div>
    </div>
    <button id="refreshBtn" style="background:#ffffff; border:1px solid #e6eaf0; border-radius:8px; padding:8px 16px; font-size:13px; font-weight:600; color:#0b5fa5; cursor:pointer;">Refresh</button>
  </div>
  <div id="summary" style="display:flex; gap:10px; flex-wrap:wrap; margin:20px 0 8px;"></div>
  <div id="list"><div style="text-align:center; color:#64748b; padding:56px 20px;">Loading vehicles…</div></div>
</div>
<div id="toast" style="position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(10px); background:#16202b; color:#fff; padding:10px 20px; border-radius:10px; font-size:13px; font-weight:500; opacity:0; pointer-events:none; transition:opacity .22s, transform .22s; z-index:99;"></div>

<script>
"use strict";

var ADD_IN_ID = "aWI4NTRlNjItNzc5Ny0wOTB";
var DEFAULT_INTERVAL_MILES = 10000;
var UNITS = "mi";
var METERS_PER_UNIT = UNITS === "km" ? 1000 : 1609.344;

var COL = {
  card:"#ffffff", ink:"#16202b", soft:"#64748b", faint:"#94a3b8", line:"#e6eaf0",
  brand:"#0b5fa5", brandSoft:"#e8f1fa", track:"#eef1f5",
  green:"#178a54", greenBg:"#e7f5ee", amber:"#b26a00", amberBg:"#fbf0dc",
  red:"#c0362f", redBg:"#fbe6e4", page:"#f5f6f8"
};

geotab.addin.oilChangeReminders = function () {
  var api, listEl, summaryEl, toastEl;

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.style.opacity = "1";
    toastEl.style.transform = "translateX(-50%) translateY(0)";
    clearTimeout(toast._t);
    toast._t = setTimeout(function () {
      toastEl.style.opacity = "0";
      toastEl.style.transform = "translateX(-50%) translateY(10px)";
    }, 2200);
  }

  function apiCall(method, params) {
    return new Promise(function (resolve, reject) { api.call(method, params, resolve, reject); });
  }

  function getOdometer(deviceId) {
    var now = new Date().toISOString();
    return apiCall("Get", {
      typeName: "StatusData",
      search: {
        deviceSearch: { id: deviceId },
        diagnosticSearch: { id: "DiagnosticOdometerAdjustmentId" },
        fromDate: now, toDate: now
      }
    }).then(function (d) { return d && d.length && d[0].data != null ? d[0].data : null; });
  }

  function fmt(n) { return Math.round(n).toLocaleString(); }

  function load() {
    listEl.innerHTML = '<div style="text-align:center; color:' + COL.soft + '; padding:56px 20px;">Loading vehicles…</div>';
    summaryEl.innerHTML = "";

    Promise.all([
      apiCall("Get", { typeName: "Device" }),
      apiCall("Get", { typeName: "AddInData", search: { addInId: ADD_IN_ID } })
    ]).then(function (res) {
      var devices = res[0].filter(function (d) { return !d.activeTo || new Date(d.activeTo) > new Date(); });
      var byDevice = {};
      res[1].forEach(function (rec) {
        var det = typeof rec.details === "string" ? JSON.parse(rec.details) : rec.details;
        if (det && det.deviceId) byDevice[det.deviceId] = { id: rec.id, details: det };
      });
      return Promise.all(devices.map(function (d) { return getOdometer(d.id); }))
        .then(function (odos) { render(devices, odos, byDevice); });
    }).catch(function (err) {
      listEl.innerHTML = '<div style="text-align:center; color:' + COL.soft + '; padding:56px 20px;">Couldn\u2019t load data: ' +
        (err && err.message ? err.message : err) + '</div>';
    });
  }

  function statPill(text, bg, fg) {
    return '<span style="font-size:11.5px; font-weight:700; padding:4px 11px; border-radius:999px; white-space:nowrap; background:' +
      bg + '; color:' + fg + ';">' + text + '</span>';
  }

  function render(devices, odos, byDevice) {
    listEl.innerHTML = "";
    var counts = { total: 0, ok: 0, soon: 0, due: 0 };

    devices.forEach(function (device, i) {
      var odoMeters = odos[i];
      if (odoMeters == null) return;
      counts.total++;

      var rec = byDevice[device.id] || null;
      var det = rec ? rec.details : {
        deviceId: device.id, deviceName: device.name,
        lastNotifiedMeters: odoMeters, intervalMiles: DEFAULT_INTERVAL_MILES,
        enabled: true, lastNotifiedDate: null
      };

      var interval = det.intervalMiles || DEFAULT_INTERVAL_MILES;
      var since = (odoMeters - det.lastNotifiedMeters) / METERS_PER_UNIT;
      var pct = Math.max(0, Math.min(100, (since / interval) * 100));
      var remaining = interval - since;

      var pillHtml, fillColor;
      if (det.enabled === false) {
        pillHtml = statPill("Off", COL.track, COL.faint); fillColor = COL.faint;
      } else if (remaining <= 0) {
        pillHtml = statPill("Due now", COL.redBg, COL.red); fillColor = COL.red; counts.due++;
      } else if (pct >= 85) {
        pillHtml = statPill("Due soon \u00b7 " + fmt(remaining) + " " + UNITS + " left", COL.amberBg, COL.amber); fillColor = COL.amber; counts.soon++;
      } else {
        pillHtml = statPill("On track \u00b7 " + fmt(remaining) + " " + UNITS + " left", COL.greenBg, COL.green); fillColor = COL.brand; counts.ok++;
      }

      var card = document.createElement("div");
      card.style.cssText = "background:" + COL.card + "; border:1px solid " + COL.line + "; border-radius:12px; padding:16px 18px; margin-bottom:12px;";
      card.innerHTML =
        '<div style="display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:14px;">' +
          '<span style="font-size:16px; font-weight:650;"></span>' +
          '<span style="font-size:13px; color:' + COL.soft + '; white-space:nowrap;">' + fmt(odoMeters / METERS_PER_UNIT) + ' ' + UNITS + ' total</span>' +
        '</div>' +
        '<div>' +
          '<div style="height:8px; background:' + COL.track + '; border-radius:999px; overflow:hidden;">' +
            '<div style="height:100%; width:' + pct + '%; border-radius:999px; background:' + fillColor + '; transition:width .5s;"></div>' +
          '</div>' +
          '<div style="display:flex; justify-content:space-between; margin-top:7px; font-size:12px; color:' + COL.soft + ';">' +
            '<span>' + fmt(Math.max(0, since)) + ' / ' + fmt(interval) + ' ' + UNITS + '</span>' +
            pillHtml +
          '</div>' +
        '</div>' +
        '<div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-top:15px; padding-top:14px; border-top:1px solid ' + COL.line + ';">' +
          '<span style="font-size:13px; color:' + COL.soft + ';">Interval <input type="number" min="500" step="500" value="' + interval + '" style="width:92px; padding:7px 9px; border:1px solid ' + COL.line + '; border-radius:8px; font-size:13px; color:' + COL.ink + ';"> ' + UNITS + '</span>' +
          '<label style="display:flex; align-items:center; gap:7px; font-size:13px; color:' + COL.soft + '; cursor:pointer;"><input type="checkbox" ' + (det.enabled !== false ? "checked" : "") + ' style="width:15px; height:15px; cursor:pointer;"> Reminders on</label>' +
          '<span style="flex:1;"></span>' +
          '<button data-act="reset" style="border:1px solid ' + COL.line + '; background:transparent; color:' + COL.brand + '; border-radius:8px; padding:8px 15px; font-size:13px; font-weight:600; cursor:pointer;">Mark serviced now</button>' +
          '<button data-act="save" style="border:none; background:' + COL.brand + '; color:#fff; border-radius:8px; padding:8px 15px; font-size:13px; font-weight:600; cursor:pointer;">Save</button>' +
        '</div>';

      card.querySelector("span").textContent = device.name;

      var intervalInput = card.querySelector('input[type="number"]');
      var enabledInput = card.querySelector('input[type="checkbox"]');
      var resetBtn = card.querySelector('[data-act="reset"]');
      var saveBtn = card.querySelector('[data-act="save"]');

      function persist(newDetails) {
        var entity = { addInId: ADD_IN_ID, groups: [{ id: "GroupCompanyId" }], details: newDetails };
        var method = rec && rec.id ? "Set" : "Add";
        if (rec && rec.id) entity.id = rec.id;
        return apiCall(method, { typeName: "AddInData", entity: entity }).then(function (newId) {
          if (!rec) rec = { id: newId, details: newDetails }; else rec.details = newDetails;
          byDevice[device.id] = rec;
        });
      }

      saveBtn.addEventListener("click", function () {
        det.intervalMiles = Number(intervalInput.value) || DEFAULT_INTERVAL_MILES;
        det.enabled = enabledInput.checked;
        det.deviceName = device.name;
        persist(det).then(function () { toast("Saved " + device.name); load(); });
      });
      resetBtn.addEventListener("click", function () {
        det.lastNotifiedMeters = odoMeters;
        det.lastNotifiedDate = new Date().toISOString();
        det.deviceName = device.name;
        persist(det).then(function () { toast(device.name + " marked serviced"); load(); });
      });

      listEl.appendChild(card);
    });

    if (counts.total === 0) {
      listEl.innerHTML = '<div style="text-align:center; color:' + COL.soft + '; padding:56px 20px;">No vehicles with odometer data yet.</div>';
      return;
    }

    function statCard(num, label, color) {
      return '<div style="background:' + COL.card + '; border:1px solid ' + COL.line + '; border-radius:10px; padding:12px 16px; flex:1; min-width:120px;">' +
        '<div style="font-size:24px; font-weight:700; letter-spacing:-0.02em; color:' + (color || COL.ink) + ';">' + num + '</div>' +
        '<div style="font-size:12px; color:' + COL.soft + '; margin-top:2px;">' + label + '</div></div>';
    }
    summaryEl.innerHTML =
      statCard(counts.total, "Vehicles tracked") +
      statCard(counts.ok, "On track") +
      statCard(counts.soon, "Due soon", counts.soon ? COL.amber : COL.ink) +
      statCard(counts.due, "Due now", counts.due ? COL.red : COL.ink);
  }

  return {
    initialize: function (freshApi, state, cb) {
      api = freshApi;
      listEl = document.getElementById("list");
      summaryEl = document.getElementById("summary");
      toastEl = document.getElementById("toast");
      document.getElementById("refreshBtn").addEventListener("click", load);
      cb();
    },
    focus: function (freshApi) { api = freshApi; load(); },
    blur: function () {}
  };
};
</script>
</body>
</html>
