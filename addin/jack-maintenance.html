<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DynastyJack Maintenance</title>
</head>
<body id="body" style="margin:0; font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif; font-size:14px; line-height:1.4;">
<div id="root" style="max-width:940px; margin:0 auto; padding:24px 20px 64px;">
  <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:18px;">
    <div>
      <div id="appTitle" style="font-size:23px; font-weight:700; letter-spacing:-0.02em;">DynastyJack Maintenance</div>
      <div id="appSub" style="margin-top:4px; font-size:13px;">Fleet-wide maintenance visibility — faults, service, and device health in one place.</div>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <select id="groupSelect" style="border-radius:8px; padding:8px 10px; font-size:13px; cursor:pointer; max-width:220px;"></select>
      <button id="themeBtn" style="border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer;">Light</button>
      <button id="refreshBtn" style="border-radius:8px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer;">Refresh</button>
    </div>
  </div>

  <div id="tabs" style="display:flex; gap:4px; margin-bottom:20px; flex-wrap:wrap;">
    <button data-tab="health" style="background:none; border:none; font-weight:600; font-size:14px; padding:10px 16px; cursor:pointer;">Fleet Health</button>
    <button data-tab="oil" style="background:none; border:none; font-weight:600; font-size:14px; padding:10px 16px; cursor:pointer;">Oil Reminders</button>
    <button data-tab="custom" style="background:none; border:none; font-weight:600; font-size:14px; padding:10px 16px; cursor:pointer;">Custom Reminders</button>
  </div>

  <div id="health"></div>
  <div id="oil" style="display:none;"></div>
  <div id="custom" style="display:none;"></div>
</div>
<div id="toast" style="position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(10px); padding:10px 20px; border-radius:10px; font-size:13px; font-weight:500; opacity:0; pointer-events:none; transition:opacity .22s, transform .22s; z-index:99;"></div>

<script>
"use strict";

var ADD_IN_ID = "aWI4NTRlNjItNzc5Ny0wOTB";
var CUSTOM_ADD_IN_ID = "ajE5ODViNGYtOTJmZC0wODk"; // separate store for custom reminders
var DEFAULT_INTERVAL_MILES = 10000;
var UNITS = "mi";
var METERS_PER_UNIT = UNITS === "km" ? 1000 : 1609.344;
var FAULT_LOOKBACK_DAYS = 7;

// ---- Theme palettes --------------------------------------------------
var THEMES = {
  dark: {
    page:"#0f1620", card:"#18212e", card2:"#1e2836", ink:"#e8eef5", soft:"#94a3b8",
    faint:"#64748b", line:"#2a3646", brand:"#3b9dff", brandSoft:"#12283f", track:"#243040",
    green:"#3ecb7f", greenBg:"#123026", amber:"#f0b24a", amberBg:"#33280f",
    red:"#ff6b63", redBg:"#3a1815", shadow:"0 2px 8px rgba(0,0,0,.4)"
  },
  light: {
    page:"#f5f6f8", card:"#ffffff", card2:"#f8fafc", ink:"#16202b", soft:"#64748b",
    faint:"#94a3b8", line:"#e6eaf0", brand:"#0b5fa5", brandSoft:"#e8f1fa", track:"#eef1f5",
    green:"#178a54", greenBg:"#e7f5ee", amber:"#b26a00", amberBg:"#fbf0dc",
    red:"#c0362f", redBg:"#fbe6e4", shadow:"0 1px 3px rgba(0,0,0,.08)"
  }
};
var theme = "dark";
var C = THEMES[theme];

geotab.addin.jackMaintenance = function () {
  var api, toastEl, healthEl, oilEl, customEl, bodyEl, rootEl, groupSelectEl;
  var allGroups = [];        // raw group list
  var groupChildren = {};    // parentId -> [childId,...]
  var selectedGroupId = null; // null = whole fleet
  var deviceGroups = {};     // deviceId -> [groupId,...]
  var expandedAsset = null; // device id whose detail panel is open
  var healthFilter = null;  // null | 'red' | 'amber' | 'green' — summary card filter
  var oilFilter = null;     // null | 'all' | 'ok' | 'soon' | 'due' — oil summary filter
  var expandedHistory = {}; // deviceId -> true if its service history is expanded
  var expandedBatch = {};   // batchId -> true if a group reminder batch is expanded
  var globalSettings = { settingsKey:"global", defaultEmailTo:null };

  // ---- utils ---------------------------------------------------------
  function toast(msg) {
    if (!toastEl) return;
    toastEl.textContent = msg;
    toastEl.style.background = C.ink; toastEl.style.color = C.page;
    toastEl.style.opacity = "1"; toastEl.style.transform = "translateX(-50%) translateY(0)";
    clearTimeout(toast._t);
    toast._t = setTimeout(function () {
      toastEl.style.opacity = "0"; toastEl.style.transform = "translateX(-50%) translateY(10px)";
    }, 2400);
  }
  function apiCall(m, p) { return new Promise(function (res, rej) { api.call(m, p, res, rej); }); }
  function multiCall(c) { return new Promise(function (res, rej) { api.multiCall(c, res, rej); }); }
  function fmt(n) { return Math.round(n).toLocaleString(); }
  function daysAgo(n) { var d = new Date(); d.setDate(d.getDate() - n); return d.toISOString(); }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) { return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }
  function pill(t, bg, fg) { return '<span style="font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; white-space:nowrap; background:'+bg+'; color:'+fg+'; display:inline-block;">'+t+'</span>'; }
  function dot(c) { return '<span style="display:inline-block; width:11px; height:11px; border-radius:50%; background:'+c+'; flex:none;"></span>'; }

  // ---- data ----------------------------------------------------------
  // Only real GO-device vehicles: active, with a valid hardware serial and a GO device type.
  // Filters out manually-created test/placeholder assets and non-GO entries.
  function isRealGoDevice(x) {
    var active = !x.activeTo || new Date(x.activeTo) > new Date();
    if (!active) return false;
    var sn = (x.serialNumber || "").trim();
    // Placeholder/custom assets have empty or all-zero serials
    var hasSerial = sn.length > 0 && !/^0+$/.test(sn) && sn.toUpperCase() !== "NOSERIALNUMBER";
    // deviceType for real units is a GoX/GO variant; custom assets are CustomVehicleDevice/CustomDevice/Untracked
    var dt = (x.deviceType || "").toLowerCase();
    var isCustom = dt.indexOf("custom") >= 0 || dt.indexOf("untracked") >= 0;
    return hasSerial && !isCustom;
  }

  function getDevices() {
    return apiCall("Get", { typeName: "Device" }).then(function (d) {
      var real = d.filter(isRealGoDevice);
      // capture group membership for filtering
      deviceGroups = {};
      real.forEach(function (dev) {
        deviceGroups[dev.id] = (dev.groups || []).map(function (g){ return g.id; });
      });
      return real;
    });
  }

  // Fetch the group tree once; build parent->children map for hierarchical filtering
  function getGroups() {
    return apiCall("Get", { typeName: "Group" }).then(function (groups) {
      allGroups = groups || [];
      groupChildren = {};
      allGroups.forEach(function (g) {
        (g.children || []).forEach(function (c) {
          if (!groupChildren[g.id]) groupChildren[g.id] = [];
          groupChildren[g.id].push(c.id);
          groupParent[c.id] = g.id;
        });
      });
      return allGroups;
    }).catch(function(){ allGroups=[]; return []; });
  }

  // All descendant group ids of a group (inclusive), for hierarchical selection
  function groupWithDescendants(groupId) {
    var out = {}; var stack = [groupId];
    while (stack.length) {
      var g = stack.pop();
      if (out[g]) continue;
      out[g] = true;
      (groupChildren[g] || []).forEach(function (c){ stack.push(c); });
    }
    return out;
  }

  // Filter a device list by the currently selected group (+ its sub-groups)
  function filterByGroup(devices) {
    if (!selectedGroupId) return devices;
    var allowed = groupWithDescendants(selectedGroupId);
    return devices.filter(function (dev) {
      var gs = deviceGroups[dev.id] || [];
      return gs.some(function (gid){ return allowed[gid]; });
    });
  }

  // Geotab built-in classification groups that add clutter, not operational value.
  // We hide these branches (and their descendants) from the group picker + grouping.
  var EXCLUDED_GROUP_NAMES = /^(powertrain and fuel type|asset type|asset information|asset purpose)$/i;
  function isExcludedGroupName(nm) { return EXCLUDED_GROUP_NAMES.test((nm||"").trim()); }

  // Build the dropdown options with indentation to show hierarchy
  function populateGroupSelect() {
    if (!groupSelectEl) return;
    // find roots (groups not listed as anyone's child)
    var isChild = {};
    Object.keys(groupChildren).forEach(function (p){ groupChildren[p].forEach(function (c){ isChild[c]=true; }); });
    var nameById = {}; allGroups.forEach(function (g){ nameById[g.id] = (g.name||"").trim() || g.id; });
    var opts = ['<option value="">All groups (whole fleet)</option>'];
    function walk(id, depth) {
      var nm = nameById[id] || id;
      if (isExcludedGroupName(nm)) return; // skip this branch entirely (and its children)
      // skip the synthetic root-ish entries with blank names
      if (nm && nm !== id) opts.push('<option value="'+esc(id)+'"'+(id===selectedGroupId?' selected':'')+'>'+ "\u00a0\u00a0".repeat(depth) + esc(nm)+'</option>');
      (groupChildren[id] || []).forEach(function (c){ walk(c, depth+1); });
    }
    allGroups.forEach(function (g){ if (!isChild[g.id]) walk(g.id, 0); });
    groupSelectEl.innerHTML = opts.join("");
  }

  // Map of groupId -> name, and parent lookup, for labeling
  function groupNameMap() {
    var m = {}; allGroups.forEach(function (g){ m[g.id] = (g.name||"").trim(); }); return m;
  }
  var groupParent = {}; // childId -> parentId (built alongside groupChildren)
  // Return a device's most specific NAMED group + its ancestor path (["East","East-Trucks"])
  function devicePrimaryGroup(deviceId) {
    var names = groupNameMap();
    // only consider named groups that aren't Geotab classification clutter
    var gs = (deviceGroups[deviceId] || []).filter(function (id){ return names[id] && !isExcludedGroupName(names[id]); });
    if (!gs.length) return { id:null, name:"Ungrouped", path:["Ungrouped"] };
    // pick the deepest (most specific) named group = the one with the longest ancestor chain
    var best = null, bestDepth = -1;
    gs.forEach(function (id) {
      var depth = 0, cur = id, guard = 0;
      while (groupParent[cur] && guard++ < 50) { depth++; cur = groupParent[cur]; }
      if (depth > bestDepth) { bestDepth = depth; best = id; }
    });
    // build path from root to the chosen group, skipping excluded ancestors
    var path = [], cur = best, guard = 0;
    while (cur && guard++ < 50) { if (names[cur] && !isExcludedGroupName(names[cur])) path.unshift(names[cur]); cur = groupParent[cur]; }
    return { id:best, name:names[best]||"Group", path:path.length?path:[names[best]||"Group"] };
  }
  function getOilState() {
    return apiCall("Get", { typeName: "AddInData", search: { addInId: ADD_IN_ID } }).then(function (recs) {
      var by = {};
      recs.forEach(function (r) {
        var det = typeof r.details === "string" ? JSON.parse(r.details) : r.details;
        if (det && det.deviceId) by[det.deviceId] = { id: r.id, details: det };
      });
      return by;
    });
  }
  function getCustom() {
    return apiCall("Get", { typeName: "AddInData", search: { addInId: CUSTOM_ADD_IN_ID } }).then(function (recs) {
      return recs.map(function (r) {
        var det = typeof r.details === "string" ? JSON.parse(r.details) : r.details;
        return { id: r.id, details: det };
      }).filter(function (x){ return x.details && x.details.deviceId; });
    }).catch(function(){ return []; });
  }
  // Global settings record (default email recipients) lives in the custom store,
  // marked with settingsKey so it's distinct from reminder records.
  var globalSettingsRec = null;
  function getGlobalSettings() {
    return apiCall("Get", { typeName: "AddInData", search: { addInId: CUSTOM_ADD_IN_ID } }).then(function (recs) {
      var found = null;
      recs.forEach(function (r) {
        var det = typeof r.details === "string" ? JSON.parse(r.details) : r.details;
        if (det && det.settingsKey === "global") found = { id:r.id, details:det };
      });
      globalSettingsRec = found;
      return found ? found.details : { settingsKey:"global", defaultEmailTo:null };
    }).catch(function(){ return { settingsKey:"global", defaultEmailTo:null }; });
  }
  function saveGlobalSettings(details) {
    var entity = { addInId:CUSTOM_ADD_IN_ID, groups:[{id:"GroupCompanyId"}], details:details };
    var method = globalSettingsRec && globalSettingsRec.id ? "Set" : "Add";
    if (globalSettingsRec && globalSettingsRec.id) entity.id = globalSettingsRec.id;
    return apiCall(method, { typeName:"AddInData", entity:entity }).then(function (newId){
      if (!globalSettingsRec) globalSettingsRec = { id:newId, details:details }; else globalSettingsRec.details = details;
    });
  }
  function getOdometers(devices) {
    var now = new Date().toISOString();
    var calls = devices.map(function (d) {
      return ["Get", { typeName: "StatusData", search: {
        deviceSearch:{id:d.id}, diagnosticSearch:{id:"DiagnosticOdometerAdjustmentId"}, fromDate:now, toDate:now
      }}];
    });
    if (!calls.length) return Promise.resolve({});
    return multiCall(calls).then(function (rs) {
      var m = {}; rs.forEach(function (r,i){ m[devices[i].id] = (r&&r.length&&r[0].data!=null)?r[0].data:null; }); return m;
    }).catch(function (e) {
      console.warn("odometer multiCall failed:", e && e.message);
      var m = {}; devices.forEach(function (d){ m[d.id] = null; }); return m;
    });
  }

  // Fuel level: query ONLY the fuel diagnostic (DiagnosticFuelLevelId) per device.
  // Because it's a single diagnostic, results can't be truncated by other diagnostics,
  // so the newest reading is reliably the true current value (like Geotab's Measurements page).
  function getFuelLevels(devices) {
    var from = daysAgo(14), to = new Date().toISOString();
    var calls = devices.map(function (d) {
      return ["Get", { typeName:"StatusData", resultsLimit: 2000, search:{
        deviceSearch:{id:d.id}, diagnosticSearch:{id:"DiagnosticFuelLevelId"}, fromDate:from, toDate:to
      }}];
    });
    if (!calls.length) return Promise.resolve({});
    return multiCall(calls).then(function (rs) {
      var m = {};
      rs.forEach(function (arr, i) {
        var newest = null, newestT = -1;
        (arr||[]).forEach(function (sd) {
          var t = sd.dateTime ? new Date(sd.dateTime).getTime() : 0;
          if (t > newestT && sd.data != null) { newestT = t; newest = sd.data; }
        });
        m[devices[i].id] = newest; // percentage
      });
      return m;
    }).catch(function (e) {
      console.warn("fuel multiCall failed:", e && e.message);
      return {};
    });
  }

  // Sensors: recent StatusData per device, matched to tire pressure (per corner),
  // fuel level, and engine RPM by DIAGNOSTIC NAME (works whether ids are KnownIds
  // or GUIDs). Returns { deviceId: { tires:{fl,fr,rl,rr}, fuel, rpm, diagValues:{id:val} } }
  var diagMetaCache = {}; // id -> { name, unit } for status diagnostics we've seen
  function classifyTireCorner(name) {
    var n = name.toLowerCase();
    if (!/tire|tyre/.test(n)) return null;
    // Exclude non-pressure tire diagnostics: "...status", "tire temperature", "sensor id", "warning light"
    if (/status|temperature|sensor|warning|\bid\b/.test(n)) return null;
    if (!/pressure/.test(n)) return null; // must be a pressure reading
    var isFront = /front/.test(n), isRear = /rear/.test(n);
    var isLeft = /left/.test(n), isRight = /right/.test(n);
    if (isFront && isLeft) return "fl";
    if (isFront && isRight) return "fr";
    if (isRear && isLeft) return "rl";
    if (isRear && isRight) return "rr";
    return "generic";
  }
  // Geotab reports tire pressure in Pascals; convert to psi. (316000 Pa ≈ 45.8 psi)
  function paToPsi(v) { return v == null ? null : v * 0.000145038; }
  function getSensors(devices) {
    // 7-day window at a high row cap: wide enough that parked assets still report,
    // and the cap is high enough the newest readings aren't truncated. We keep the
    // newest value per diagnostic (by timestamp) below. Assets with NO data in 7
    // days retry with a 30-day window and are flagged as "sitting".
    var from = daysAgo(7), to = new Date().toISOString();
    var calls = devices.map(function (d) {
      return ["Get", { typeName:"StatusData", resultsLimit: 5000, search:{
        deviceSearch:{id:d.id}, fromDate:from, toDate:to
      }}];
    });
    if (!calls.length) return Promise.resolve({});
    var sittingDevices = {}; // deviceId -> true if no data in the primary 7-day window
    return multiCall(calls).then(function (rs) {
      // For any device with NO rows in the last 7 days (parked/sitting), retry with 30 days
      var wideFrom = daysAgo(30);
      var retries = [], retryIdx = [];
      rs.forEach(function (arr, i) {
        if (!arr || arr.length === 0) {
          sittingDevices[devices[i].id] = true; // no activity in 7 days = sitting
          retryIdx.push(i);
          retries.push(["Get", { typeName:"StatusData", resultsLimit: 5000, search:{
            deviceSearch:{id:devices[i].id}, fromDate:wideFrom, toDate:to
          }}]);
        }
      });
      var retryPromise = retries.length ? multiCall(retries).then(function (rr) {
        rr.forEach(function (arr, k) { rs[retryIdx[k]] = arr; });
      }).catch(function(){}) : Promise.resolve();

      return retryPromise.then(function () {
      // Collect diagnostic ids we need names for
      var needNames = {};
      rs.forEach(function (arr) {
        (arr||[]).forEach(function (sd) {
          var id = sd.diagnostic && sd.diagnostic.id;
          if (id && !diagMetaCache[id]) needNames[id] = true;
        });
      });
      var ids = Object.keys(needNames);
      var namePromise = ids.length
        ? multiCall(ids.map(function (id){ return ["Get", { typeName:"Diagnostic", search:{ id:id } }]; }))
            .then(function (drs) {
              drs.forEach(function (dr, i) {
                var d0 = dr && dr[0];
                diagMetaCache[ids[i]] = { name: (d0 && (d0.name||d0.code)) || ids[i], unit: (d0 && d0.unitOfMeasure) || "" };
              });
            }).catch(function(){})
        : Promise.resolve();

      return namePromise.then(function () {
        var out = {};
        rs.forEach(function (arr, i) {
          var did = devices[i].id;
          var latest = {}; // diagId -> {value, when}
          (arr||[]).forEach(function (sd) {
            var id = sd.diagnostic && sd.diagnostic.id; if (!id) return;
            var when = sd.dateTime ? new Date(sd.dateTime).getTime() : 0;
            if (!latest[id] || when > latest[id].when) latest[id] = { value: sd.data, when: when };
          });
          var info = { tires:{fl:null,fr:null,rl:null,rr:null,generic:null}, fuel:null, rpm:null, esr:null, battery:null, coolant:null, engineHours:null, oilLife:null, sitting:!!sittingDevices[did], lastSeen:null, _raw:[] };
          // newest timestamp across all diagnostics = last time the asset reported
          Object.keys(latest).forEach(function (id) {
            if (latest[id].when && (!info.lastSeen || latest[id].when > info.lastSeen)) info.lastSeen = latest[id].when;
          });
          Object.keys(latest).forEach(function (id) {
            var meta = diagMetaCache[id] || { name:id };
            var nm = (meta.name||"").toLowerCase();
            var val = latest[id].value;
            info._raw.push({ name: meta.name || id, value: val }); // for debug
            var corner = classifyTireCorner(meta.name||"");
            if (corner) {
              var psi = paToPsi(val);
              if (psi != null && psi > 0 && psi < 200 && corner !== "generic") info.tires[corner] = psi;
            } else if (/engine oil life remaining|oil life/.test(nm)) {
              info.oilLife = val; // percentage remaining, from the vehicle's own monitor
            } else if (/electrical system rating|\besr\b/.test(nm)) {
              info.esr = val; // 0-100 %
            } else if (/battery voltage|\bbattery\b/.test(nm) && /volt/.test(nm)) {
              info.battery = val; // volts
            } else if (/engine coolant temp|coolant temp/.test(nm)) {
              info.coolant = val; // °F on this fleet (verified: 185°F in Asset > Maintenance)
            } else if (/engine hour/.test(nm)) {
              info.engineHours = val;
            }
          });
          out[did] = info;
          // DEBUG: log every diagnostic name+value this device reported so we can tune matching
          if (info._raw.length) {
            console.log("SENSORS ["+ (devices[i].name||did) +"]:", info._raw.map(function(r){ return r.name+"="+r.value; }).join(" | "));
          } else {
            console.log("SENSORS ["+ (devices[i].name||did) +"]: (no status data in window)");
          }
        });
        return out;
      });
      }); // close retryPromise.then
    }).catch(function (e) {
      console.warn("sensors multiCall failed:", e && e.message);
      return {};
    });
  }
  // Faults with per-fault detail retained, grouped per device.
  // Capped result count + timeout so a heavy history can't hang the dashboard.
  function getFaults(devices) {
    var call = apiCall("Get", { typeName:"FaultData", resultsLimit: 5000, search:{ fromDate:daysAgo(FAULT_LOOKBACK_DAYS), toDate:new Date().toISOString() } })
      .then(function (faults) {
        var active = faults.filter(function (f) {
          var a = f.faultState ? (f.faultState==="Active"||f.faultState==="PendingAndActive") : true;
          return a && !f.dismissDateTime;
        });
        var by = {};
        active.forEach(function (f) {
          var did = f.device && f.device.id; if (!did) return;
          if (!by[did]) by[did] = { total:0, red:0, amber:0, deviceCount:0, vehicleCount:0, items:[] };
          var sev = (f.severity || "").toLowerCase();
          var isRed = sev.indexOf("crit")>=0 || sev.indexOf("severe")>=0 || sev.indexOf("high")>=0;
          var code = (f.diagnostic && (f.diagnostic.code || f.diagnostic.id)) || "fault";
          var diagId = f.diagnostic && f.diagnostic.id ? f.diagnostic.id : null;
          var faultStr = ((diagId||"") + " " + code).toLowerCase();
          var isDevice = /telematics|devicetype|invaliddevice|iox|harness|godevice|watchdog|firmware|tamper/.test(faultStr);
          by[did].total++;
          if (isDevice) by[did].deviceCount++; else by[did].vehicleCount++;
          if (isRed) by[did].red++; else by[did].amber++;
          by[did].items.push({
            diagId: diagId,
            code: code,
            controller: f.controller && f.controller.id ? f.controller.id : "",
            severity: isRed ? "critical" : "warning",
            isDevice: isDevice,
            first: f.dateTime || f.activeFrom || null,
            state: f.faultState || "Active"
          });
        });
        return by;
      });
    // If faults are slow/unavailable, don't block the dashboard — return empty after 15s.
    var timeout = new Promise(function (resolve) {
      setTimeout(function () { resolve({ __timedOut: true }); }, 15000);
    });
    return Promise.race([call, timeout]).then(function (r) {
      if (r && r.__timedOut) { console.warn("FaultData timed out — showing without faults"); return {}; }
      return r;
    }).catch(function (e) {
      console.warn("FaultData failed:", e && e.message); return {};
    });
  }
  // Resolve diagnostic names for the codes we actually have (cached)
  var diagNameCache = {};
  function resolveDiagnostics(faultMap) {
    var ids = {};
    Object.keys(faultMap).forEach(function (did) {
      faultMap[did].items.forEach(function (it) { if (it.diagId && !diagNameCache[it.diagId]) ids[it.diagId]=true; });
    });
    var list = Object.keys(ids);
    if (!list.length) return Promise.resolve();
    var calls = list.map(function (id) { return ["Get", { typeName:"Diagnostic", search:{ id:id } }]; });
    return multiCall(calls).then(function (rs) {
      rs.forEach(function (r, i) {
        var name = (r && r.length && (r[0].name || r[0].code)) ? (r[0].name || r[0].code) : list[i];
        diagNameCache[list[i]] = name;
      });
    }).catch(function(){ /* names are best-effort */ });
  }

  // ---- system mapping for the car diagram ----------------------------
  // Best-effort: infer a vehicle SYSTEM from diagnostic name/controller text.
  function systemsFromFaults(faultInfo) {
    var sys = { engine:0, transmission:0, brakes:0, tires:0, electrical:0, emissions:0, other:0 };
    if (!faultInfo) return sys;
    faultInfo.items.forEach(function (it) {
      if (it.isDevice) return; // device/telematics faults aren't a vehicle system
      var name = ((diagNameCache[it.diagId] || it.code || "") + " " + (it.controller||"")).toLowerCase();
      var w = it.severity === "critical" ? 2 : 1;
      if (/tire|tyre|tpms|pressure|wheel/.test(name)) sys.tires += w;
      else if (/brak|abs|traction/.test(name)) sys.brakes += w;
      else if (/trans|gear|clutch|shift/.test(name)) sys.transmission += w;
      else if (/emiss|dpf|def|nox|scr|egr|catalyst|o2|oxygen/.test(name)) sys.emissions += w;
      else if (/battery|volt|charg|alternat|electr|lamp|light/.test(name)) sys.electrical += w;
      else if (/engine|coolant|oil|fuel|misfire|cylinder|temp|rpm|maf|map|throttle/.test(name)) sys.engine += w;
      else sys.other += w;
    });
    return sys;
  }

  // Shop-style recommended action based on the fault's diagnostic name + severity.
  function recommendedAction(name, severity) {
    var n = (name || "").toLowerCase();
    var urgent = severity === "critical";
    if (/tire|tyre|tpms|pressure/.test(n)) return "Check tire pressures and inspect for leaks or damage.";
    if (/brak|abs/.test(n)) return urgent ? "Inspect brake system immediately — do not operate until checked." : "Inspect brake pads, lines, and ABS sensors.";
    if (/coolant|overheat|temp/.test(n)) return urgent ? "Stop and let engine cool — check coolant level, thermostat, and radiator." : "Check coolant level and thermostat.";
    if (/oil pressure|oil press/.test(n)) return "Stop engine — check oil level and oil pressure sender.";
    if (/misfire|cylinder/.test(n)) return "Inspect spark plugs, coils, and injectors for the affected cylinder.";
    if (/dpf|soot|particulate/.test(n)) return "Perform DPF regeneration; inspect for excessive soot loading.";
    if (/def|scr|nox|urea/.test(n)) return "Check DEF level and quality; inspect SCR/NOx sensors.";
    if (/egr/.test(n)) return "Inspect EGR valve and cooler for sticking or clogging.";
    if (/o2|oxygen|fuel trim|maf|map/.test(n)) return "Check for vacuum leaks; inspect O2/MAF sensors and fuel trims.";
    if (/battery|voltage|charg|alternat/.test(n)) return urgent ? "Charging fault — test alternator and battery before next start." : "Test battery and charging system.";
    if (/trans|gear|clutch|shift/.test(n)) return urgent ? "Transmission fault — check fluid and scan trans module before driving." : "Check transmission fluid level and condition.";
    if (/iox|communication|opcode|reset|device/.test(n)) return "Telematics/device fault — verify harness seating; report to reseller if it persists.";
    if (/lamp|light|bulb/.test(n)) return "Inspect and replace the affected lamp/bulb.";
    return urgent ? "Diagnose with a scan tool and service promptly." : "Schedule an inspection to diagnose.";
  }

  // ---- risk rating (hybrid) ------------------------------------------
  // Trust Geotab's severity flag when present; use a heuristic only to fill gaps.
  // Returns one of: critical, high, medium, low, ignore. This is SUGGESTED priority,
  // not a certified severity rating — labeled as guidance in the UI.
  var RISK_META = {
    critical: { label:"Critical",  order:0, color:"red",   advise:"Address immediately — may be unsafe to operate." },
    high:     { label:"High risk", order:1, color:"red",   advise:"Service soon — likely affects drivability or emissions." },
    medium:   { label:"Medium",    order:2, color:"amber", advise:"Schedule an inspection at next convenience." },
    low:      { label:"Low risk",  order:3, color:"amber", advise:"Monitor — minor issue, no immediate action needed." },
    ignore:   { label:"Ignore",    order:4, color:"faint", advise:"No vehicle impact — safe to ignore unless it recurs often." }
  };
  function riskRating(fault) {
    // fault: { name, code, severity ('critical'|'warning'), isDevice }
    var name = (fault.name || fault.code || "").toLowerCase();
    // Device/telematics faults have no vehicle impact → ignore
    if (fault.isDevice) return "ignore";
    // Geotab flagged it critical/high → trust that as at least "high", bump to critical for safety systems
    if (fault.severity === "critical") {
      if (/brak|abs|steer|coolant|overheat|oil pressure|fire|airbag/.test(name)) return "critical";
      return "high";
    }
    // Heuristic fills the gap for non-critical (Geotab "warning"/unknown) faults, by system stakes
    if (/brak|abs|steer|airbag|oil pressure|coolant|overheat/.test(name)) return "high";     // safety/engine-protection
    if (/misfire|cylinder|trans|gear|clutch|shift|dpf|def|scr|nox|egr|turbo|boost/.test(name)) return "medium"; // drivability/emissions
    if (/o2|oxygen|fuel trim|maf|map|evap|purge|sensor|lamp|light|bulb|tire|tpms|pressure|battery|voltage/.test(name)) return "low"; // minor/sensor
    return "medium"; // unknown vehicle fault → default middle, not alarmist, not dismissive
  }

  // ---- health scoring ------------------------------------------------
  function scoreVehicle(device, odoMeters, faults, oil, sensors) {
    var reasons = [], level = "green";
    function bump(t){ if(t==="red") level="red"; else if(t==="amber"&&level!=="red") level="amber"; }
    if (faults && faults.total>0) {
      // Vehicle (mechanical) faults drive the real status
      var vRed = 0, vAmber = 0;
      (faults.items||[]).forEach(function (it){
        if (it.isDevice) return;
        if (it.severity==="critical") vRed++; else vAmber++;
      });
      if (vRed>0){ bump("red"); reasons.push(vRed+" critical fault"+(vRed>1?"s":"")); }
      if (vAmber>0){ bump("amber"); reasons.push(vAmber+" fault"+(vAmber>1?"s":"")); }
      // Device/telematics faults are minor — never escalate past amber, labeled clearly
      var devCount = faults.deviceCount || 0;
      if (devCount>0){ bump("amber"); reasons.push(devCount+" device fault"+(devCount>1?"s":"")); }
    }
    var oilInfo = null;
    if (oil && odoMeters!=null) {
      var d = oil.details, interval = d.intervalMiles||DEFAULT_INTERVAL_MILES;
      var since = (odoMeters - d.lastNotifiedMeters)/METERS_PER_UNIT, remaining = interval - since;
      oilInfo = { since:since, interval:interval, remaining:remaining, enabled:d.enabled!==false };
      if (d.enabled!==false) {
        if (remaining<=0){ bump("red"); reasons.push("oil change overdue"); }
        else if (remaining<=interval*0.15){ bump("amber"); reasons.push("oil due soon"); }
      }
    }
    // Sensor-driven flags
    if (sensors) {
      // Tire pressure: any corner low
      if (sensors.tires) {
        var corners = ["fl","fr","rl","rr"], lowRed = false, lowAmber = false;
        corners.forEach(function (k) {
          var p = sensors.tires[k];
          if (p == null) return;
          if (p < 28) lowRed = true; else if (p < 32) lowAmber = true;
        });
        if (lowRed){ bump("red"); reasons.push("low tire pressure"); }
        else if (lowAmber){ bump("amber"); reasons.push("tire pressure marginal"); }
      }
      // Battery voltage (12V system): <12.2 amber, <11.8 red
      if (sensors.battery != null) {
        if (sensors.battery < 11.8){ bump("red"); reasons.push("low battery voltage"); }
        else if (sensors.battery < 12.2){ bump("amber"); reasons.push("battery voltage low"); }
      }
      // ESR (Electrical System Rating, 0-100 Optimal): <40 red, <60 amber
      if (sensors.esr != null) {
        if (sensors.esr < 40){ bump("red"); reasons.push("poor electrical rating"); }
        else if (sensors.esr < 60){ bump("amber"); reasons.push("electrical rating low"); }
      }
      // Coolant temp: treat >=240F red, >=225F amber (values look like F on this fleet)
      if (sensors.coolant != null) {
        var ct = sensors.coolant;
        if (ct >= 240){ bump("red"); reasons.push("coolant temp high"); }
        else if (ct >= 225){ bump("amber"); reasons.push("coolant temp elevated"); }
      }
    }
    if (odoMeters==null){ bump("amber"); reasons.push("no recent data"); }
    return { level:level, reasons:reasons, faults:faults, oil:oilInfo, odoMeters:odoMeters, sensors:sensors };
  }

  // ---- FLEET HEALTH render -------------------------------------------
  function renderHealth(devices, odoMap, faultMap, oilMap, sensorMap) {
    if (!healthEl) return;
    sensorMap = sensorMap || {};
    var scored = devices.map(function (d) {
      return { device:d, health:scoreVehicle(d, odoMap[d.id], faultMap[d.id], oilMap[d.id], sensorMap[d.id]) };
    });
    var order = { red:0, amber:1, green:2 };
    scored.sort(function (a,b) {
      if (order[a.health.level]!==order[b.health.level]) return order[a.health.level]-order[b.health.level];
      return ((b.health.faults&&b.health.faults.total)||0) - ((a.health.faults&&a.health.faults.total)||0);
    });
    var counts = { red:0, amber:0, green:0 };
    scored.forEach(function (s){ counts[s.health.level]++; });

    var html = '<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px;">' +
      sumCard(counts.red,"Need service",C.red,"red") + sumCard(counts.amber,"Watch",C.amber,"amber") +
      sumCard(counts.green,"Healthy",C.green,"green") + sumCard(devices.length,"Total assets",C.ink,null) + '</div>';

    // Apply filter
    var visible = healthFilter ? scored.filter(function (s){ return s.health.level===healthFilter; }) : scored;

    if (healthFilter) {
      var fname = healthFilter==="red"?"Need service":healthFilter==="amber"?"Watch":"Healthy";
      html += '<div style="display:flex; align-items:center; gap:10px; margin:4px 2px 12px;">' +
        '<span style="font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:'+C.soft+';">Showing: '+fname+'</span>' +
        '<button id="clearFilter" style="border:1px solid '+C.line+'; background:transparent; color:'+C.brand+'; border-radius:6px; padding:3px 10px; font-size:12px; cursor:pointer;">Clear filter</button></div>';
      visible.forEach(function (s) { html += assetCard(s.device, s.health, sensorMap[s.device.id]); });
    } else {
      var anyAttention = scored.some(function (s){ return s.health.level!=="green"; });
      if (anyAttention) html += sectionLabel("Needs attention");
      scored.forEach(function (s, idx) {
        if (idx>0 && scored[idx-1].health.level!=="green" && s.health.level==="green") html += sectionLabel("Healthy");
        html += assetCard(s.device, s.health, sensorMap[s.device.id]);
      });
    }

    if (!devices.length) html = '<div style="text-align:center; color:'+C.soft+'; padding:56px 20px;">No assets found.</div>';
    healthEl.innerHTML = html;

    // wire summary-card filter clicks
    document.querySelectorAll('[data-filter]').forEach(function (el) {
      el.addEventListener("click", function () {
        var f = el.getAttribute("data-filter");
        healthFilter = (healthFilter===f || f==="") ? null : f;
        expandedAsset = null;
        renderHealth(devices, odoMap, faultMap, oilMap, sensorMap);
      });
    });
    var cf = document.getElementById("clearFilter");
    if (cf) cf.addEventListener("click", function () { healthFilter=null; renderHealth(devices, odoMap, faultMap, oilMap, sensorMap); });

    // wire asset expand clicks
    visible.forEach(function (s) {
      var card = document.getElementById("asset-"+cssId(s.device.id));
      if (!card) return;
      var head = card.querySelector('[data-role="head"]');
      head.addEventListener("click", function () {
        expandedAsset = (expandedAsset===s.device.id) ? null : s.device.id;
        renderHealth(devices, odoMap, faultMap, oilMap, sensorMap);
      });
    });
  }

  function sumCard(num, label, fg, filterKey) {
    var active = healthFilter && healthFilter===filterKey;
    var clickable = filterKey!=null;
    var border = active ? "2px solid "+fg : "1px solid "+C.line;
    return '<div '+(clickable?'data-filter="'+filterKey+'" ':'')+'style="background:'+C.card+'; border:'+border+'; border-radius:10px; padding:12px 16px; flex:1; min-width:120px; box-shadow:'+C.shadow+';'+(clickable?' cursor:pointer;':'')+'">' +
      '<div style="font-size:26px; font-weight:700; letter-spacing:-0.02em; color:'+fg+';">'+num+'</div>' +
      '<div style="font-size:12px; color:'+C.soft+'; margin-top:2px;">'+label+(clickable?' \u203a':'')+'</div></div>';
  }
  function sectionLabel(t) {
    return '<div style="font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:'+C.soft+'; margin:18px 2px 10px;">'+t+'</div>';
  }
  function cssId(s) { return String(s).replace(/[^a-zA-Z0-9_-]/g,"_"); }

  function assetCard(device, h, sensors) {
    var edge = h.level==="red"?C.red:h.level==="amber"?C.amber:C.green;
    var chips = "";
    if (h.faults && h.faults.total>0) {
      if (h.faults.red>0) chips += pill(h.faults.red+" critical", C.redBg, C.red)+" ";
      if (h.faults.amber>0) chips += pill(h.faults.amber+" warning", C.amberBg, C.amber)+" ";
    }
    if (h.oil && h.oil.enabled) {
      if (h.oil.remaining<=0) chips += pill("oil overdue", C.redBg, C.red)+" ";
      else if (h.oil.remaining<=h.oil.interval*0.15) chips += pill("oil "+fmt(h.oil.remaining)+" "+UNITS, C.amberBg, C.amber)+" ";
    }
    // low-tire chip if any corner reads low
    if (sensors && sensors.tires) {
      var low = ["fl","fr","rl","rr"].some(function (k){ return sensors.tires[k]!=null && sensors.tires[k] < 30; });
      if (low) chips += pill("low tire", C.redBg, C.red)+" ";
    }
    // "Sitting" tag if the asset hasn't reported in over 7 days
    if (sensors && sensors.sitting) {
      var daysAgoTxt = sensors.lastSeen ? Math.floor((Date.now()-sensors.lastSeen)/86400000)+"d" : "7d+";
      chips += pill("sitting "+daysAgoTxt, C.track, C.amber)+" ";
    }
    if (h.odoMeters==null) chips += pill("no data", C.track, C.faint)+" ";
    if (!chips) chips = pill("healthy", C.greenBg, C.green);

    var odoTxt = h.odoMeters!=null ? fmt(h.odoMeters/METERS_PER_UNIT)+" "+UNITS : "—";
    var isOpen = expandedAsset===device.id;
    var caret = isOpen ? "\u25be" : "\u25b8";
    var detail = isOpen ? detailPanel(device, h, sensors) : "";

    return '<div id="asset-'+cssId(device.id)+'" style="background:'+C.card+'; border:1px solid '+C.line+'; border-left:4px solid '+edge+'; border-radius:10px; margin-bottom:10px; box-shadow:'+C.shadow+'; overflow:hidden;">' +
      '<div data-role="head" style="padding:14px 16px; cursor:pointer;">' +
        '<div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">' +
          dot(edge) +
          '<span style="font-size:15px; font-weight:650; flex:1; color:'+C.ink+';">'+esc(device.name)+'</span>' +
          '<span style="font-size:12px; color:'+C.soft+'; white-space:nowrap;">'+odoTxt+'</span>' +
          '<span style="font-size:13px; color:'+C.faint+'; width:14px; text-align:center;">'+caret+'</span>' +
        '</div>' +
        '<div style="margin-bottom:6px;">'+chips+'</div>' +
        '<div style="font-size:12.5px; color:'+C.soft+';">'+esc(h.reasons.length?h.reasons.join(" \u00b7 "):"All clear")+'</div>' +
      '</div>' +
      detail +
    '</div>';
  }

  // ---- detail panel: car diagram + fault list + readouts -------------
  function detailPanel(device, h, sensors) {
    var sys = systemsFromFaults(h.faults);
    var carSvg = carDiagram(h.level, sys, sensors);

    // Readout rows (now shown UNDER the car on the left)
    function readRow(label, valueHtml) {
      return '<div style="display:flex; justify-content:space-between; font-size:12.5px; color:'+C.soft+'; padding:7px 0; border-top:1px solid '+C.line+';">' +
        '<span>'+label+'</span>'+valueHtml+'</div>';
    }
    var rows = "";
    if (sensors && sensors.fuel != null) {
      var fc = sensors.fuel <= 15 ? C.amber : C.ink;
      rows += readRow("Fuel level", '<span style="color:'+fc+'; font-weight:600;">'+Math.round(sensors.fuel)+'%</span>');
    }
    if (sensors && sensors.esr != null) {
      var ec = sensors.esr < 40 ? C.red : (sensors.esr < 60 ? C.amber : C.green);
      rows += readRow("Electrical rating (ESR)", '<span style="color:'+ec+'; font-weight:600;">'+Math.round(sensors.esr)+'%</span>');
    }
    if (sensors && sensors.battery != null) {
      var bc = sensors.battery < 11.8 ? C.red : (sensors.battery < 12.2 ? C.amber : C.ink);
      rows += readRow("Battery voltage", '<span style="color:'+bc+'; font-weight:600;">'+sensors.battery.toFixed(1)+' V</span>');
    }
    if (sensors && sensors.coolant != null) {
      var cc = sensors.coolant >= 240 ? C.red : (sensors.coolant >= 225 ? C.amber : C.ink);
      rows += readRow("Coolant temp", '<span style="color:'+cc+'; font-weight:600;">'+Math.round(sensors.coolant)+'\u00b0F</span>');
    }
    if (sensors && sensors.oilLife != null) {
      var olc = sensors.oilLife < 15 ? C.red : (sensors.oilLife < 30 ? C.amber : C.green);
      rows += readRow("Oil life remaining", '<span style="color:'+olc+'; font-weight:600;">'+Math.round(sensors.oilLife)+'%</span>');
    }
    if (h.oil) {
      var oc = h.oil.remaining<=0?C.red:(h.oil.remaining<=h.oil.interval*0.15?C.amber:C.green);
      rows += readRow("Oil change", '<span style="color:'+oc+'; font-weight:600;">' +
        (h.oil.remaining<=0 ? "Overdue by "+fmt(-h.oil.remaining)+" "+UNITS : fmt(h.oil.remaining)+" "+UNITS+" remaining")+'</span>');
    }
    var sensorBlock = rows
      ? '<div style="margin-top:10px;"><div style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:'+C.soft+'; margin-bottom:2px;">Readings</div>'+rows+'</div>'
      : '';

    // ---- faults: risk-rated, most-recent highlighted ----
    function isDeviceFault(name, code) {
      var s = ((name||"") + " " + (code||"")).toLowerCase();
      return /telematics|device type|invalid device|iox|harness|go device|gps|antenna|watchdog|firmware|tamper|unplug|reader|add-on|internal reset/.test(s);
    }
    var faultList = "";
    if (h.faults && h.faults.items.length) {
      var groups = {};
      var overallLatest = 0;
      h.faults.items.forEach(function (it) {
        var name = diagNameCache[it.diagId] || it.code || "Unknown fault";
        var isDev = it.isDevice || isDeviceFault(name, it.code);
        var key = name + "|" + it.severity;
        if (!groups[key]) groups[key] = { name:name, code:it.code, severity:it.severity, isDevice:isDev, count:0, latest:null };
        groups[key].count++;
        var t = it.first ? new Date(it.first).getTime() : 0;
        if (t && (!groups[key].latest || t > groups[key].latest)) groups[key].latest = t;
        if (t > overallLatest) overallLatest = t;
      });
      var arr = Object.keys(groups).map(function (k){ return groups[k]; });
      // assign risk tier to each
      arr.forEach(function (g){ g.risk = riskRating(g); });
      // sort by risk order, then most-recent
      arr.sort(function (a,b){
        var ra = RISK_META[a.risk].order, rb = RISK_META[b.risk].order;
        if (ra !== rb) return ra - rb;
        return (b.latest||0) - (a.latest||0);
      });

      function renderFault(g) {
        var meta = RISK_META[g.risk];
        var c = meta.color==="red"?C.red:(meta.color==="amber"?C.amber:C.faint);
        var bg = meta.color==="red"?C.redBg:(meta.color==="amber"?C.amberBg:C.track);
        var muted = g.risk==="ignore" || g.risk==="low";
        var when = g.latest ? new Date(g.latest).toLocaleDateString() : "";
        var isMostRecent = g.latest && g.latest === overallLatest;
        var countBadge = g.count>1 ? ' <span style="font-size:11px; color:'+C.faint+';">\u00d7'+g.count+'</span>' : '';
        var action = g.risk==="ignore" ? meta.advise : recommendedAction(g.name, g.severity);
        var recentTag = isMostRecent ? '<span style="font-size:10px; font-weight:700; padding:2px 7px; border-radius:999px; background:'+C.brand+'22; color:'+C.brand+'; margin-left:6px;">most recent</span>' : '';
        return '<div style="padding:11px 0; border-top:1px solid '+C.line+';'+(muted?' opacity:0.82;':'')+(isMostRecent?' background:'+C.brand+'0d; border-left:3px solid '+C.brand+'; padding-left:10px; margin-left:-13px;':'')+'">' +
          '<div style="display:flex; align-items:center; gap:10px;">' +
            dot(c) +
            '<div style="flex:1;"><div style="font-size:13px; color:'+(muted?C.soft:C.ink)+'; font-weight:600;">'+esc(g.name)+countBadge+recentTag+'</div>' +
            '<div style="font-size:11.5px; color:'+C.soft+';">'+esc(g.code)+(when?" · latest "+when:"")+(g.count>1?" · "+g.count+" occurrences":"")+'</div></div>' +
            pill(meta.label, bg, c) +
          '</div>' +
          '<div style="margin-left:21px; margin-top:5px; font-size:12px; color:'+C.soft+'; border-left:2px solid '+c+'; padding-left:9px;">' +
            '<span style="color:'+c+'; font-weight:600;">'+(g.risk==="ignore"?"Suggested: ":"Recommended: ")+'</span>'+esc(action) +
          '</div>' +
        '</div>';
      }

      faultList = arr.map(renderFault).join("");
    } else {
      faultList = '<div style="font-size:13px; color:'+C.green+'; padding:10px 0; font-weight:600;">No faults in the last 7 days.</div>';
    }

    return '<div style="padding:4px 16px 16px; background:'+C.card2+'; border-top:1px solid '+C.line+';">' +
      '<div style="display:flex; gap:18px; flex-wrap:wrap; align-items:flex-start;">' +
        '<div style="flex:0 0 auto; width:210px; max-width:100%;">'+carSvg+sensorBlock+'</div>' +
        '<div style="flex:1; min-width:240px;">' +
          '<div style="font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:'+C.soft+'; margin:12px 0 2px;">Faults (last 7 days) \u00b7 suggested priority</div>' +
          faultList +
          debugBlock(sensors) +
        '</div>' +
      '</div>' +
    '</div>';
  }

  // TEMP: shows the raw diagnostic names+values this asset reported, so tire/sensor
  // matching can be tuned to the fleet's actual naming. Remove once dialed in.
  var SHOW_DEBUG = false;
  function debugBlock(sensors) {
    if (!SHOW_DEBUG || !sensors || !sensors._raw || !sensors._raw.length) return "";
    var rows = sensors._raw.map(function (r) {
      return '<div style="font-size:11px; color:'+C.soft+'; padding:2px 0; font-family:monospace;">'+esc(r.name)+' = '+esc(String(r.value))+'</div>';
    }).join("");
    return '<div style="margin-top:14px; padding-top:12px; border-top:1px dashed '+C.line+';">' +
      '<div style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:'+C.amber+'; margin-bottom:4px;">Debug: raw diagnostics ('+sensors._raw.length+')</div>' +
      rows +
    '</div>';
  }

  // Top-down pickup with four individual tires (PSI) and system zones.
  function carDiagram(level, sys, sensors) {
    var bodyFill = level==="red"?C.redBg:level==="amber"?C.amberBg:C.greenBg;
    var bodyStroke = level==="red"?C.red:level==="amber"?C.amber:C.green;

    // Each system zone gets its OWN status color: green healthy, amber = warning
    // fault weight, red = critical. This sits on top of the overall body tint.
    function sysStatus(v) { return v>=2 ? "red" : v>=1 ? "amber" : "green"; }
    function sysFill(v) {
      var s = sysStatus(v);
      return s==="red" ? C.red : s==="amber" ? C.amber : C.green;
    }
    function sysTextColor(v) {
      // filled zones use white text for contrast; healthy green zone too
      return "#ffffff";
    }

    var tires = (sensors && sensors.tires) || {fl:null,fr:null,rl:null,rr:null};
    function tireColor(psi) {
      if (psi == null) return C.faint;
      if (psi < 30) return C.red;
      if (psi < 34) return C.amber;
      return C.green;
    }
    function tirePsiTxt(psi) { return psi == null ? "\u2013" : Math.round(psi)+""; }
    function tire(x, y, psi, labelX, anchor) {
      var col = tireColor(psi);
      return '<rect x="'+x+'" y="'+y+'" width="16" height="42" rx="6" fill="'+col+'"/>' +
        '<text x="'+labelX+'" y="'+(y+26)+'" font-size="11" font-weight="700" text-anchor="'+anchor+'" fill="'+C.ink+'">'+tirePsiTxt(psi)+'</text>';
    }
    // A system zone: filled rounded rect in its status color + centered white label
    function zone(x, y, w, hgt, label, v, fontSize) {
      var fill = sysFill(v);
      var op = sysStatus(v)==="green" ? "0.80" : "0.95"; // healthy still clearly colored
      return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+hgt+'" rx="7" fill="'+fill+'" opacity="'+op+'"/>' +
        '<text x="'+(x+w/2)+'" y="'+(y+hgt/2+3)+'" font-size="'+fontSize+'" font-weight="700" text-anchor="middle" fill="#ffffff" style="letter-spacing:.03em;">'+label+'</text>';
    }

    var anyTireData = ["fl","fr","rl","rr"].some(function (k){ return tires[k]!=null; });

    // legend row under the diagram
    function legendDot(color, text) {
      return '<span style="display:inline-flex; align-items:center; gap:4px; margin:0 6px;"><span style="width:9px;height:9px;border-radius:50%;background:'+color+';display:inline-block;"></span><span style="font-size:10.5px;color:'+C.soft+';">'+text+'</span></span>';
    }

    return '<svg viewBox="0 0 210 340" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vehicle status diagram">' +
      '<text x="105" y="16" font-size="11" text-anchor="middle" fill="'+C.soft+'">FRONT</text>' +
      // body (overall health tint)
      '<rect x="52" y="26" width="106" height="266" rx="24" fill="'+bodyFill+'" stroke="'+bodyStroke+'" stroke-width="3"/>' +
      // cab window
      '<rect x="66" y="120" width="78" height="44" rx="10" fill="'+C.card+'" stroke="'+C.line+'" stroke-width="2"/>' +
      // four tires with PSI
      tire(36, 70, tires.fl, 26, "end") +
      tire(158, 70, tires.fr, 184, "start") +
      tire(36, 228, tires.rl, 26, "end") +
      tire(158, 228, tires.rr, 184, "start") +
      // engine zone (front) — its own status color
      zone(70, 36, 70, 30, "ENGINE", sys.engine, 10) +
      // transmission zone (center)
      zone(74, 176, 62, 26, "TRANS", sys.transmission, 9) +
      // brakes zone (rear)
      zone(72, 252, 66, 30, "BRAKES", sys.brakes, 10) +
      '</svg>' +
      '<div style="text-align:center; margin-top:8px;">' +
        legendDot(C.green,"OK") + legendDot(C.amber,"Warning") + legendDot(C.red,"Critical") +
      '</div>' +
      '<div style="text-align:center; font-size:11px; color:'+C.soft+'; margin-top:4px;">' +
        (anyTireData ? "Tire PSI shown per corner" : "No tire pressure data for this asset") +
      '</div>';
  }

  // ---- OIL tab (editable, unchanged logic) ---------------------------
  function renderOil(devices, odoMap, oilMap, sensorMap) {
    if (!oilEl) return;
    sensorMap = sensorMap || {};
    var counts = { total:0, ok:0, soon:0, due:0 };
    // First pass: compute each vehicle's status so we can count + filter
    var items = [];
    devices.forEach(function (device) {
      var odoMeters = odoMap[device.id]; if (odoMeters==null) return;
      counts.total++;
      var rec = oilMap[device.id]||null;
      var det = rec?rec.details:{ deviceId:device.id, deviceName:device.name, lastNotifiedMeters:odoMeters, intervalMiles:DEFAULT_INTERVAL_MILES, enabled:true, lastNotifiedDate:null };
      var interval = det.intervalMiles||DEFAULT_INTERVAL_MILES;
      var since = (odoMeters-det.lastNotifiedMeters)/METERS_PER_UNIT;
      var pct = Math.max(0,Math.min(100,(since/interval)*100)), remaining = interval-since;
      var status;
      if (det.enabled===false) status = "off";
      else if (remaining<=0){ status="due"; counts.due++; }
      else if (pct>=85){ status="soon"; counts.soon++; }
      else { status="ok"; counts.ok++; }
      items.push({ device:device, rec:rec, det:det, odoMeters:odoMeters, interval:interval, since:since, pct:pct, remaining:remaining, status:status });
    });

    // Summary (clickable filters)
    var summary = '<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;">' +
      oilSumCard(counts.total,"Vehicles tracked",C.ink,"all") +
      oilSumCard(counts.ok,"On track",C.green,"ok") +
      oilSumCard(counts.soon,"Due soon",counts.soon?C.amber:C.ink,"soon") +
      oilSumCard(counts.due,"Due now",counts.due?C.red:C.ink,"due") + '</div>';

    if (oilFilter && oilFilter!=="all") {
      var fname = oilFilter==="ok"?"On track":oilFilter==="soon"?"Due soon":"Due now";
      summary += '<div style="display:flex; align-items:center; gap:10px; margin:0 2px 14px;">' +
        '<span style="font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:'+C.soft+';">Showing: '+fname+'</span>' +
        '<button id="clearOilFilter" style="border:1px solid '+C.line+'; background:transparent; color:'+C.brand+'; border-radius:6px; padding:3px 10px; font-size:12px; cursor:pointer;">Clear filter</button></div>';
    }

    oilEl.innerHTML = summary;
    if (counts.total===0) { oilEl.innerHTML += '<div style="text-align:center; color:'+C.soft+'; padding:40px 20px;">No vehicles with odometer data yet.</div>'; return; }

    var visible = (oilFilter && oilFilter!=="all") ? items.filter(function (it){ return it.status===oilFilter; }) : items;

    // attach group info + sort by group path so headers group naturally
    visible.forEach(function (it) { it.group = devicePrimaryGroup(it.device.id); });
    var hasAnyGroup = visible.some(function (it){ return it.group.id != null; });
    if (hasAnyGroup) {
      visible.sort(function (a,b) {
        var pa = a.group.path.join(" / "), pb = b.group.path.join(" / ");
        if (pa !== pb) return pa < pb ? -1 : 1;
        return a.device.name < b.device.name ? -1 : 1;
      });
    }

    var frag = document.createElement("div");
    var lastGroupPath = null;

    visible.forEach(function (it) {
      // emit a group header when the group path changes (only if we actually have groups)
      if (hasAnyGroup) {
        var pathStr = it.group.path.join(" / ");
        if (pathStr !== lastGroupPath) {
          lastGroupPath = pathStr;
          var header = document.createElement("div");
          header.style.cssText = "margin:18px 2px 8px; display:flex; align-items:center; gap:8px;";
          // render path with sub-group indentation feel: bold last segment, muted ancestors
          var crumb = it.group.path.map(function (seg, i) {
            var isLast = i === it.group.path.length-1;
            return '<span style="color:'+(isLast?C.ink:C.soft)+'; font-weight:'+(isLast?'700':'500')+';">'+esc(seg)+'</span>';
          }).join('<span style="color:'+C.faint+'; margin:0 6px;">\u203a</span>');
          header.innerHTML = '<span style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:'+C.brand+';">Group</span>' +
            '<span style="font-size:13.5px;">'+crumb+'</span>';
          frag.appendChild(header);
        }
      }
      var device=it.device, det=it.det, rec=it.rec, odoMeters=it.odoMeters, interval=it.interval, since=it.since, pct=it.pct, remaining=it.remaining;
      var pillHtml, fill;
      if (it.status==="off"){ pillHtml=pill("Off",C.track,C.faint); fill=C.faint; }
      else if (it.status==="due"){ pillHtml=pill("Due now",C.redBg,C.red); fill=C.red; }
      else if (it.status==="soon"){ pillHtml=pill("Due soon \u00b7 "+fmt(remaining)+" "+UNITS+" left",C.amberBg,C.amber); fill=C.amber; }
      else { pillHtml=pill("On track \u00b7 "+fmt(remaining)+" "+UNITS+" left",C.greenBg,C.green); fill=C.brand; }
      var sensors = sensorMap[device.id];
      var oilLifeBadge = "";
      if (sensors && sensors.oilLife != null) {
        var olc = sensors.oilLife < 15 ? C.red : (sensors.oilLife < 30 ? C.amber : C.green);
        oilLifeBadge = '<span style="font-size:12px; color:'+olc+'; font-weight:600; margin-right:12px;">Oil life '+Math.round(sensors.oilLife)+'%</span>';
      }
      var histHtml = "";
      var hist = (det.history || []).slice().sort(function (a,b){ return new Date(b.date)-new Date(a.date); });
      if (hist.length) {
        var histId = "hist-"+cssId(device.id);
        var isOpen = !!expandedHistory[device.id];
        var rowsHtml = hist.map(function (e) {
          var mi = e.odoMeters!=null ? fmt(e.odoMeters/METERS_PER_UNIT)+" "+UNITS : "—";
          var dt = e.date ? new Date(e.date).toLocaleDateString() : "";
          var isAuto = e.source==="auto";
          var srcBadge = isAuto
            ? '<span style="font-size:10.5px; font-weight:700; padding:2px 7px; border-radius:999px; background:'+C.amberBg+'; color:'+C.amber+'; margin-left:6px;">auto-triggered</span>'
            : '<span style="font-size:10.5px; font-weight:700; padding:2px 7px; border-radius:999px; background:'+C.greenBg+'; color:'+C.green+'; margin-left:6px;">manual</span>';
          var ol = (e.oilLife!=null) ? ' \u00b7 oil life was '+Math.round(e.oilLife)+'%' : '';
          var label = isAuto ? "auto-reset (service not confirmed)" : "marked serviced";
          return '<div style="display:flex; justify-content:space-between; align-items:center; font-size:12.5px; color:'+C.soft+'; padding:5px 0; border-top:1px solid '+C.line+';">' +
            '<span>'+dt+' \u00b7 '+label+ol+srcBadge+'</span><span style="color:'+C.ink+'; font-weight:600;">'+mi+'</span></div>';
        }).join("");
        histHtml = '<div style="margin-top:14px; padding-top:12px; border-top:1px solid '+C.line+';">' +
          '<div data-histtoggle="'+esc(device.id)+'" style="display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none;">' +
            '<span style="font-size:13px; color:'+C.faint+'; width:12px;">'+(isOpen?"\u25be":"\u25b8")+'</span>' +
            '<span style="font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:'+C.soft+';">Service history</span>' +
            '<span style="font-size:11.5px; color:'+C.faint+';">('+hist.length+')</span>' +
          '</div>' +
          '<div id="'+histId+'" style="display:'+(isOpen?"block":"none")+'; margin-top:6px;">'+rowsHtml+'</div>' +
        '</div>';
      }

      var card = document.createElement("div");
      card.style.cssText = "background:"+C.card+"; border:1px solid "+C.line+"; border-radius:12px; padding:16px 18px; margin-bottom:12px; box-shadow:"+C.shadow+";";
      card.innerHTML =
        '<div style="display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:14px;">' +
          '<span style="font-size:16px; font-weight:650; color:'+C.ink+';">'+esc(device.name)+'</span>' +
          '<span style="font-size:13px; color:'+C.soft+';">'+oilLifeBadge+fmt(odoMeters/METERS_PER_UNIT)+' '+UNITS+' total</span></div>' +
        '<div><div style="height:8px; background:'+C.track+'; border-radius:999px; overflow:hidden;">' +
          '<div style="height:100%; width:'+pct+'%; border-radius:999px; background:'+fill+';"></div></div>' +
          '<div style="display:flex; justify-content:space-between; margin-top:7px; font-size:12px; color:'+C.soft+';">' +
            '<span>'+fmt(Math.max(0,since))+' / '+fmt(interval)+' '+UNITS+'</span>'+pillHtml+'</div></div>' +
        '<div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-top:15px; padding-top:14px; border-top:1px solid '+C.line+';">' +
          '<span style="font-size:13px; color:'+C.soft+';">Interval <input type="number" min="500" step="500" value="'+interval+'" style="width:92px; padding:7px 9px; border:1px solid '+C.line+'; border-radius:8px; font-size:13px; background:'+C.card2+'; color:'+C.ink+';"> '+UNITS+'</span>' +
          '<label style="display:flex; align-items:center; gap:7px; font-size:13px; color:'+C.soft+'; cursor:pointer;"><input type="checkbox" '+(det.enabled!==false?"checked":"")+' style="width:15px; height:15px;"> Reminders on</label>' +
          '<span style="flex:1;"></span>' +
          '<button data-act="reset" style="border:1px solid '+C.line+'; background:transparent; color:'+C.brand+'; border-radius:8px; padding:8px 15px; font-size:13px; font-weight:600; cursor:pointer;">Mark serviced now</button>' +
          '<button data-act="save" style="border:none; background:'+C.brand+'; color:#fff; border-radius:8px; padding:8px 15px; font-size:13px; font-weight:600; cursor:pointer;">Save</button>' +
        '</div>' +
        histHtml;
      var intervalInput = card.querySelector('input[type="number"]');
      var enabledInput = card.querySelector('input[type="checkbox"]');
      card.querySelector('[data-act="save"]').addEventListener("click", function () {
        det.intervalMiles = Number(intervalInput.value)||DEFAULT_INTERVAL_MILES;
        det.enabled = enabledInput.checked; det.deviceName = device.name;
        persistOil(rec, det, device, oilMap).then(function () { toast("Saved "+device.name); reloadAll(); });
      });
      card.querySelector('[data-act="reset"]').addEventListener("click", function () {
        det.lastNotifiedMeters = odoMeters; det.lastNotifiedDate = new Date().toISOString(); det.deviceName = device.name;
        det.emailPending = true; det.emailPendingReason = "serviced"; det.emailPendingOdoMeters = odoMeters;
        if (!det.history) det.history = [];
        var ol = (sensors && sensors.oilLife != null) ? sensors.oilLife : null;
        det.history.push({ date: new Date().toISOString(), odoMeters: odoMeters, source: "manual", oilLife: ol });
        persistOil(rec, det, device, oilMap).then(function () { toast(device.name+" marked serviced — confirmation queued"); reloadAll(); });
      });
      frag.appendChild(card);
    });

    oilEl.appendChild(frag);

    // wire filter clicks
    document.querySelectorAll('[data-oilfilter]').forEach(function (el) {
      el.addEventListener("click", function () {
        var f = el.getAttribute("data-oilfilter");
        oilFilter = (oilFilter===f) ? null : f;
        renderOil(devices, odoMap, oilMap, sensorMap);
      });
    });
    var cof = document.getElementById("clearOilFilter");
    if (cof) cof.addEventListener("click", function () { oilFilter=null; renderOil(devices, odoMap, oilMap, sensorMap); });

    // wire service-history collapse toggles
    oilEl.querySelectorAll('[data-histtoggle]').forEach(function (el) {
      el.addEventListener("click", function () {
        var id = el.getAttribute("data-histtoggle");
        expandedHistory[id] = !expandedHistory[id];
        renderOil(devices, odoMap, oilMap, sensorMap);
      });
    });
  }
  function oilSumCard(num, label, fg, filterKey) {
    var active = oilFilter===filterKey;
    var border = active ? "2px solid "+fg : "1px solid "+C.line;
    return '<div data-oilfilter="'+filterKey+'" style="background:'+C.card+'; border:'+border+'; border-radius:10px; padding:12px 16px; flex:1; min-width:120px; box-shadow:'+C.shadow+'; cursor:pointer;">' +
      '<div style="font-size:26px; font-weight:700; letter-spacing:-0.02em; color:'+fg+';">'+num+'</div>' +
      '<div style="font-size:12px; color:'+C.soft+'; margin-top:2px;">'+label+' \u203a</div></div>';
  }
  function persistOil(rec, det, device, oilMap) {
    var entity = { addInId:ADD_IN_ID, groups:[{id:"GroupCompanyId"}], details:det };
    var method = rec&&rec.id?"Set":"Add"; if (rec&&rec.id) entity.id = rec.id;
    return apiCall(method, { typeName:"AddInData", entity:entity }).then(function (newId) {
      if (!rec) rec = { id:newId, details:det }; else rec.details = det; oilMap[device.id] = rec;
    });
  }

  // ---- CUSTOM REMINDERS tab ------------------------------------------
  function persistCustom(rec) {
    var entity = { addInId:CUSTOM_ADD_IN_ID, groups:[{id:"GroupCompanyId"}], details:rec.details };
    var method = rec.id ? "Set" : "Add"; if (rec.id) entity.id = rec.id;
    return apiCall(method, { typeName:"AddInData", entity:entity }).then(function (newId) {
      if (!rec.id) rec.id = newId; return rec;
    });
  }
  function deleteCustom(rec) {
    if (!rec.id) return Promise.resolve();
    return apiCall("Remove", { typeName:"AddInData", entity:{ id:rec.id, addInId:CUSTOM_ADD_IN_ID } });
  }

  function renderCustom(devices, odoMap, customList) {
    if (!customEl) return;
    customList = customList || [];
    var odoByDevice = odoMap || {};
    var nameById = {}; devices.forEach(function (d){ nameById[d.id] = d.name; });

    // ---- add form ----
    var deviceOpts = devices.map(function (d) {
      return '<option value="'+esc(d.id)+'">'+esc(d.name)+'</option>';
    }).join("");
    // real operational groups only (exclude Geotab classification clutter)
    var names = groupNameMap();
    var groupOpts = allGroups.filter(function (g) {
      return names[g.id] && !isExcludedGroupName(names[g.id]);
    }).map(function (g) {
      // count vehicles in this group + descendants
      var allowed = groupWithDescendants(g.id);
      var count = devices.filter(function (dev){ return (deviceGroups[dev.id]||[]).some(function (gid){ return allowed[gid]; }); }).length;
      return '<option value="'+esc(g.id)+'">'+esc(names[g.id])+' ('+count+' vehicle'+(count===1?'':'s')+')</option>';
    }).join("");

    var form =
      '<div style="background:'+C.card+'; border:1px solid '+C.line+'; border-radius:12px; padding:16px 18px; margin-bottom:18px; box-shadow:'+C.shadow+';">' +
        '<div style="font-size:14px; font-weight:650; color:'+C.ink+'; margin-bottom:12px;">Add a custom reminder</div>' +
        '<div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">' +
          '<label style="font-size:12px; color:'+C.soft+';">Apply to<br><select id="cr-mode" style="margin-top:4px; padding:7px 9px; border:1px solid '+C.line+'; border-radius:8px; font-size:13px; background:'+C.card2+'; color:'+C.ink+';"><option value="asset">A single asset</option><option value="group">A whole group</option></select></label>' +
          '<label id="cr-asset-wrap" style="font-size:12px; color:'+C.soft+';">Asset<br><select id="cr-device" style="margin-top:4px; padding:7px 9px; border:1px solid '+C.line+'; border-radius:8px; font-size:13px; background:'+C.card2+'; color:'+C.ink+'; min-width:170px;">'+deviceOpts+'</select></label>' +
          '<label id="cr-group-wrap" style="display:none; font-size:12px; color:'+C.soft+';">Group<br><select id="cr-group" style="margin-top:4px; padding:7px 9px; border:1px solid '+C.line+'; border-radius:8px; font-size:13px; background:'+C.card2+'; color:'+C.ink+'; min-width:200px;">'+(groupOpts||'<option value="">No groups found</option>')+'</select></label>' +
          '<label style="font-size:12px; color:'+C.soft+';">Reminder name<br><input id="cr-label" type="text" placeholder="e.g. Brake inspection" style="margin-top:4px; padding:7px 9px; border:1px solid '+C.line+'; border-radius:8px; font-size:13px; background:'+C.card2+'; color:'+C.ink+'; min-width:170px;"></label>' +
          '<label style="font-size:12px; color:'+C.soft+';">Type<br><select id="cr-type" style="margin-top:4px; padding:7px 9px; border:1px solid '+C.line+'; border-radius:8px; font-size:13px; background:'+C.card2+'; color:'+C.ink+';"><option value="mi">Every X miles</option><option value="days">Every X days</option></select></label>' +
          '<label style="font-size:12px; color:'+C.soft+';">Interval<br><input id="cr-interval" type="number" min="1" value="5000" style="margin-top:4px; width:100px; padding:7px 9px; border:1px solid '+C.line+'; border-radius:8px; font-size:13px; background:'+C.card2+'; color:'+C.ink+';"></label>' +
          '<label style="font-size:12px; color:'+C.soft+';">Email to<br><input id="cr-email" type="text" placeholder="optional" style="margin-top:4px; padding:7px 9px; border:1px solid '+C.line+'; border-radius:8px; font-size:13px; background:'+C.card2+'; color:'+C.ink+'; min-width:150px;"></label>' +
          '<button id="cr-add" style="border:none; background:'+C.brand+'; color:#fff; border-radius:8px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer;">Add reminder</button>' +
        '</div>' +
        '<div id="cr-mode-note" style="font-size:11.5px; color:'+C.soft+'; margin-top:10px; display:none;">A separate reminder will be created for each vehicle in the group, each tracking its own mileage.</div>' +
      '</div>';

    // ---- existing reminders ----
    // Build a single reminder card's inner HTML (used standalone and inside batches)
    function reminderCard(rec, insideBatch) {
      var d = rec.details;
      var unit = d.type === "days" ? "days" : UNITS;
      var progress, remaining, pct;
      if (d.type === "days") {
        var start = d.baselineDate ? new Date(d.baselineDate).getTime() : Date.now();
        var elapsed = (Date.now() - start) / 86400000;
        progress = elapsed; remaining = d.interval - elapsed;
        pct = Math.max(0, Math.min(100, (elapsed / d.interval) * 100));
      } else {
        var odo = odoByDevice[d.deviceId];
        var since = odo!=null && d.baselineMeters!=null ? (odo - d.baselineMeters)/METERS_PER_UNIT : 0;
        progress = since; remaining = d.interval - since;
        pct = Math.max(0, Math.min(100, (since / d.interval) * 100));
      }
      var pillHtml, fill;
      if (d.enabled===false){ pillHtml=pill("Off",C.track,C.faint); fill=C.faint; }
      else if (remaining<=0){ pillHtml=pill("Due now",C.redBg,C.red); fill=C.red; }
      else if (pct>=85){ pillHtml=pill("Due soon",C.amberBg,C.amber); fill=C.amber; }
      else { pillHtml=pill(fmt(Math.max(0,remaining))+" "+unit+" left",C.greenBg,C.green); fill=C.brand; }

      var histHtml = "";
      var hist = (d.history||[]).slice().sort(function (a,b){ return new Date(b.date)-new Date(a.date); });
      if (hist.length) {
        histHtml = '<div style="margin-top:12px; padding-top:12px; border-top:1px solid '+C.line+';">' +
          '<div style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:'+C.soft+'; margin-bottom:5px;">History</div>' +
          hist.map(function (e){
            var val = d.type==="days" ? (e.date?new Date(e.date).toLocaleDateString():"") : (e.odoMeters!=null?fmt(e.odoMeters/METERS_PER_UNIT)+" "+UNITS:"—");
            var dt = e.date ? new Date(e.date).toLocaleDateString() : "";
            var isAuto = e.source==="auto";
            var badge = isAuto
              ? '<span style="font-size:10px; font-weight:700; padding:1px 6px; border-radius:999px; background:'+C.amberBg+'; color:'+C.amber+'; margin-left:6px;">auto</span>'
              : '<span style="font-size:10px; font-weight:700; padding:1px 6px; border-radius:999px; background:'+C.greenBg+'; color:'+C.green+'; margin-left:6px;">done</span>';
            return '<div style="display:flex; justify-content:space-between; align-items:center; font-size:12px; color:'+C.soft+'; padding:3px 0;"><span>'+dt+' \u00b7 '+esc(d.label||"Reminder")+badge+'</span><span style="color:'+C.ink+';">'+val+'</span></div>';
          }).join("") + '</div>';
      }
      var margin = insideBatch ? "margin:10px 0 0;" : "margin-bottom:12px;";
      var titleLine = insideBatch
        ? '<div><span style="font-size:14px; font-weight:600; color:'+C.ink+';">'+esc(d.deviceName||nameById[d.deviceId]||"")+'</span>' +
          '<div style="font-size:12px; color:'+C.soft+'; margin-top:2px;">every '+fmt(d.interval)+' '+unit+'</div></div>'
        : '<div><span style="font-size:15px; font-weight:650; color:'+C.ink+';">'+esc(d.label||"Reminder")+'</span>' +
          '<div style="font-size:12px; color:'+C.soft+'; margin-top:2px;">'+esc(d.deviceName||nameById[d.deviceId]||"")+' \u00b7 every '+fmt(d.interval)+' '+unit+'</div></div>';

      return '<div data-crid="'+esc(rec.id)+'" style="background:'+(insideBatch?C.card2:C.card)+'; border:1px solid '+C.line+'; border-radius:12px; padding:14px 16px; '+margin+' '+(insideBatch?'':'box-shadow:'+C.shadow+';')+'">' +
        '<div style="display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:12px;">' +
          titleLine + pillHtml +
        '</div>' +
        '<div style="height:8px; background:'+C.track+'; border-radius:999px; overflow:hidden;"><div style="height:100%; width:'+pct+'%; border-radius:999px; background:'+fill+';"></div></div>' +
        '<div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-top:14px; padding-top:12px; border-top:1px solid '+C.line+';">' +
          '<label style="display:flex; align-items:center; gap:7px; font-size:13px; color:'+C.soft+'; cursor:pointer;"><input type="checkbox" data-cr="enabled" '+(d.enabled!==false?"checked":"")+' style="width:15px; height:15px;"> On</label>' +
          '<button data-cr="edit-email" style="border:1px solid '+C.line+'; background:transparent; color:'+C.soft+'; border-radius:8px; padding:7px 12px; font-size:12.5px; font-weight:600; cursor:pointer;">Email\u2026</button>' +
          '<span style="flex:1;"></span>' +
          '<button data-cr="complete" style="border:1px solid '+C.line+'; background:transparent; color:'+C.brand+'; border-radius:8px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer;">Mark done</button>' +
          '<button data-cr="delete" style="border:1px solid '+C.line+'; background:transparent; color:'+C.red+'; border-radius:8px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer;">Delete</button>' +
        '</div>' +
        histHtml +
      '</div>';
    }

    var listHtml = "";
    if (!customList.length) {
      listHtml = '<div style="text-align:center; color:'+C.soft+'; padding:30px 20px;">No custom reminders yet. Add one above.</div>';
    } else {
      // separate batch reminders from standalone ones
      var batches = {}, standalone = [];
      customList.forEach(function (rec) {
        var b = rec.details.batchId;
        if (b) { if (!batches[b]) batches[b]=[]; batches[b].push(rec); }
        else standalone.push(rec);
      });

      // render each batch as a collapsible line
      Object.keys(batches).forEach(function (bId) {
        var recs = batches[bId];
        var d0 = recs[0].details;
        var unit = d0.type === "days" ? "days" : UNITS;
        var isOpen = !!expandedBatch[bId];
        // batch summary status: worst of the group
        var anyDue=false, anySoon=false, onCount=0;
        recs.forEach(function (r){
          var dd=r.details; if (dd.enabled!==false) onCount++;
          var rem;
          if (dd.type==="days"){ var st=dd.baselineDate?new Date(dd.baselineDate).getTime():Date.now(); rem=dd.interval-((Date.now()-st)/86400000); }
          else { var o=odoByDevice[dd.deviceId]; var s=o!=null&&dd.baselineMeters!=null?(o-dd.baselineMeters)/METERS_PER_UNIT:0; rem=dd.interval-s; }
          if (dd.enabled!==false){ if (rem<=0) anyDue=true; else if (rem<=dd.interval*0.15) anySoon=true; }
        });
        var bPill = anyDue?pill(recs.length+" vehicles \u00b7 some due",C.redBg,C.red)
                  : anySoon?pill(recs.length+" vehicles \u00b7 due soon",C.amberBg,C.amber)
                  : pill(recs.length+" vehicles \u00b7 on track",C.greenBg,C.green);

        var inner = "";
        if (isOpen) {
          inner = '<div style="margin-top:12px; padding-top:12px; border-top:1px solid '+C.line+';">' +
            '<div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px;">' +
              '<span style="font-size:12px; color:'+C.soft+';">Set interval for all:</span>' +
              '<input data-batchinterval="'+esc(bId)+'" type="number" min="1" value="'+d0.interval+'" style="width:100px; padding:6px 9px; border:1px solid '+C.line+'; border-radius:8px; font-size:13px; background:'+C.card+'; color:'+C.ink+';"> '+unit +
              '<button data-batchsave="'+esc(bId)+'" style="border:none; background:'+C.brand+'; color:#fff; border-radius:8px; padding:6px 13px; font-size:12.5px; font-weight:600; cursor:pointer;">Apply to all '+recs.length+'</button>' +
              '<button data-batchdelete="'+esc(bId)+'" style="border:1px solid '+C.line+'; background:transparent; color:'+C.red+'; border-radius:8px; padding:6px 13px; font-size:12.5px; font-weight:600; cursor:pointer;">Delete all</button>' +
            '</div>' +
            recs.map(function (r){ return reminderCard(r, true); }).join("") +
          '</div>';
        }

        listHtml += '<div style="background:'+C.card+'; border:1px solid '+C.line+'; border-radius:12px; padding:16px 18px; margin-bottom:12px; box-shadow:'+C.shadow+';">' +
          '<div data-batchtoggle="'+esc(bId)+'" style="display:flex; align-items:center; gap:12px; cursor:pointer; user-select:none;">' +
            '<span style="font-size:14px; color:'+C.faint+'; width:12px;">'+(isOpen?"\u25be":"\u25b8")+'</span>' +
            '<div style="flex:1;"><span style="font-size:15px; font-weight:650; color:'+C.ink+';">'+esc(d0.label||"Reminder")+'</span>' +
            '<div style="font-size:12px; color:'+C.soft+'; margin-top:2px;">'+esc(d0.batchGroupName||"Group")+' \u00b7 '+recs.length+' vehicles \u00b7 every '+fmt(d0.interval)+' '+unit+'</div></div>' +
            bPill +
          '</div>' + inner +
        '</div>';
      });

      // standalone reminders as normal cards
      standalone.forEach(function (rec){ listHtml += reminderCard(rec, false); });
    }

    var settingsBar =
      '<div style="background:'+C.card+'; border:1px solid '+C.line+'; border-radius:12px; padding:12px 16px; margin-bottom:18px; box-shadow:'+C.shadow+'; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">' +
        '<span style="font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:'+C.soft+';">Default email recipients</span>' +
        '<span id="cr-default-email" style="flex:1; min-width:180px; font-size:13px; color:'+C.ink+';">'+esc((globalSettings&&globalSettings.defaultEmailTo)||"(none set — using fleet address)")+'</span>' +
        '<button id="cr-edit-default" style="border:1px solid '+C.line+'; background:transparent; color:'+C.brand+'; border-radius:8px; padding:6px 13px; font-size:12.5px; font-weight:600; cursor:pointer;">Edit</button>' +
      '</div>';

    customEl.innerHTML = form + settingsBar + '<div id="cr-list">' + listHtml + '</div>';

    // wire default-recipients editor
    var editDefault = $("cr-edit-default");
    if (editDefault) editDefault.addEventListener("click", function () {
      var current = (globalSettings && globalSettings.defaultEmailTo) || "";
      var input = window.prompt("Default email recipients for ALL reminders (comma-separated). Individual reminders can override this:", current);
      if (input === null) return;
      var det = { settingsKey:"global", defaultEmailTo: input.trim() || null };
      saveGlobalSettings(det).then(function () { globalSettings = det; toast("Default recipients saved"); renderCustom(devices, odoMap, customList); });
    });

    // wire mode toggle (asset vs group)
    var modeSel = $("cr-mode");
    if (modeSel) modeSel.addEventListener("change", function () {
      var isGroup = modeSel.value === "group";
