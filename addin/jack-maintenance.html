      var aw = $("cr-asset-wrap"), gw = $("cr-group-wrap"), note = $("cr-mode-note");
      if (aw) aw.style.display = isGroup ? "none" : "";
      if (gw) gw.style.display = isGroup ? "" : "none";
      if (note) note.style.display = isGroup ? "" : "none";
    });

    // wire add form
    var addBtn = $("cr-add");
    if (addBtn) addBtn.addEventListener("click", function () {
      var mode = $("cr-mode").value;
      var label = ($("cr-label").value || "").trim() || "Reminder";
      var type = $("cr-type").value;
      var interval = Number($("cr-interval").value) || 0;
      var email = ($("cr-email").value || "").trim();
      if (interval <= 0) { toast("Enter a valid interval"); return; }

      function makeDet(deviceId, batchId, batchGroupName) {
        return {
          deviceId: deviceId, deviceName: nameById[deviceId] || "",
          label: label, type: type, interval: interval,
          baselineMeters: type==="mi" ? (odoByDevice[deviceId]||0) : null,
          baselineDate: new Date().toISOString(),
          enabled: true, emailTo: email || null, emailPending: false, history: [],
          batchId: batchId || null, batchGroupName: batchGroupName || null
        };
      }

      if (mode === "group") {
        var groupId = $("cr-group").value;
        if (!groupId) { toast("Pick a group"); return; }
        var allowed = groupWithDescendants(groupId);
        var targets = devices.filter(function (dev){ return (deviceGroups[dev.id]||[]).some(function (gid){ return allowed[gid]; }); });
        if (!targets.length) { toast("No vehicles in that group"); return; }
        var batchId = "batch_" + Date.now() + "_" + Math.floor(Math.random()*100000);
        var gName = (groupNameMap()[groupId] || "Group");
        Promise.all(targets.map(function (dev){ return persistCustom({ id:null, details:makeDet(dev.id, batchId, gName) }); }))
          .then(function () { toast('"'+label+'" added to '+targets.length+' vehicle'+(targets.length===1?'':'s')); reloadAll(); });
      } else {
        var deviceId = $("cr-device").value;
        if (!deviceId) { toast("Pick an asset"); return; }
        persistCustom({ id:null, details:makeDet(deviceId, null, null) }).then(function () { toast('"'+label+'" added'); reloadAll(); });
      }
    });

    // wire per-card actions
    customList.forEach(function (rec) {
      var cardEl = customEl.querySelector('[data-crid="'+cssIdSel(rec.id)+'"]');
      if (!cardEl) return;
      var enabledCb = cardEl.querySelector('[data-cr="enabled"]');
      var completeBtn = cardEl.querySelector('[data-cr="complete"]');
      var deleteBtn = cardEl.querySelector('[data-cr="delete"]');
      if (enabledCb) enabledCb.addEventListener("change", function () {
        rec.details.enabled = enabledCb.checked;
        persistCustom(rec).then(function () { toast("Updated"); });
      });
      if (completeBtn) completeBtn.addEventListener("click", function () {
        var d = rec.details;
        if (!d.history) d.history = [];
        var odo = odoByDevice[d.deviceId];
        d.history.push({ date: new Date().toISOString(), odoMeters: d.type==="mi" ? odo : null, source: "manual" });
        if (d.type==="mi") d.baselineMeters = odo!=null ? odo : d.baselineMeters;
        d.baselineDate = new Date().toISOString();
        d.emailPending = true;
        persistCustom(rec).then(function () { toast(d.label+" marked done"); reloadAll(); });
      });
      if (deleteBtn) deleteBtn.addEventListener("click", function () {
        deleteCustom(rec).then(function () { toast("Reminder deleted"); reloadAll(); });
      });
      var emailBtn = cardEl.querySelector('[data-cr="edit-email"]');
      if (emailBtn) emailBtn.addEventListener("click", function () {
        var current = rec.details.emailTo || "";
        var input = window.prompt("Email recipients for \""+(rec.details.label||"reminder")+"\" (comma-separated). Leave blank to use the fleet default:", current);
        if (input === null) return; // cancelled
        rec.details.emailTo = input.trim() || null;
        persistCustom(rec).then(function () { toast("Recipients updated"); });
      });
    });

    // wire batch toggles + batch edit/delete
    customEl.querySelectorAll('[data-batchtoggle]').forEach(function (el) {
      el.addEventListener("click", function () {
        var b = el.getAttribute("data-batchtoggle");
        expandedBatch[b] = !expandedBatch[b];
        renderCustom(devices, odoMap, customList);
      });
    });
    customEl.querySelectorAll('[data-batchsave]').forEach(function (el) {
      el.addEventListener("click", function () {
        var b = el.getAttribute("data-batchsave");
        var input = customEl.querySelector('[data-batchinterval="'+cssIdSel(b)+'"]');
        var newInterval = Number(input && input.value) || 0;
        if (newInterval <= 0) { toast("Enter a valid interval"); return; }
        var recs = customList.filter(function (r){ return r.details.batchId === b; });
        Promise.all(recs.map(function (r){ r.details.interval = newInterval; return persistCustom(r); }))
          .then(function () { toast("Updated interval for "+recs.length+" vehicles"); reloadAll(); });
      });
    });
    customEl.querySelectorAll('[data-batchdelete]').forEach(function (el) {
      el.addEventListener("click", function () {
        var b = el.getAttribute("data-batchdelete");
        var recs = customList.filter(function (r){ return r.details.batchId === b; });
        Promise.all(recs.map(function (r){ return deleteCustom(r); }))
          .then(function () { toast("Deleted "+recs.length+" reminders"); reloadAll(); });
      });
    });
  }
  function cssIdSel(s) { return String(s).replace(/["\\]/g,"\\$&"); }

  // ---- theme + tabs --------------------------------------------------
  function $(id) { return document.getElementById(id); }
  function applyTheme() {
    C = THEMES[theme];
    if (bodyEl) { bodyEl.style.background = C.page; bodyEl.style.color = C.ink; }
    var sub = $("appSub"); if (sub) sub.style.color = C.soft;
    var tb = $("themeBtn");
    if (tb) {
      tb.textContent = theme==="dark" ? "Light" : "Dark";
      tb.style.background = C.card; tb.style.border = "1px solid "+C.line; tb.style.color = C.ink;
    }
    var rb = $("refreshBtn");
    if (rb) { rb.style.background = C.card; rb.style.border = "1px solid "+C.line; rb.style.color = C.brand; }
    var gs = $("groupSelect");
    if (gs) { gs.style.background = C.card; gs.style.border = "1px solid "+C.line; gs.style.color = C.ink; }
    var tabsWrap = $("tabs");
    if (tabsWrap) tabsWrap.style.borderBottom = "1px solid "+C.line;
    styleTabs();
  }
  function styleTabs() {
    if (!healthEl) return;
    var active = "health";
    if (oilEl && oilEl.style.display!=="none") active = "oil";
    else if (customEl && customEl.style.display!=="none") active = "custom";
    else if (healthEl.style.display!=="none") active = "health";
    document.querySelectorAll("#tabs button").forEach(function (b) {
      var on = b.getAttribute("data-tab")===active;
      b.style.borderBottom = on ? "2px solid "+C.brand : "2px solid transparent";
      b.style.color = on ? C.brand : C.soft;
    });
  }
  function switchTab(name) {
    if (healthEl) healthEl.style.display = name==="health"?"":"none";
    if (oilEl) oilEl.style.display = name==="oil"?"":"none";
    if (customEl) customEl.style.display = name==="custom"?"":"none";
    styleTabs();
  }

  // ---- orchestration -------------------------------------------------
  var cache = { devices:[], odoMap:{}, faultMap:{}, oilMap:{}, sensorMap:{}, customList:[], allDevices:[] };
  function safe(p, fallback) { return Promise.resolve().then(function(){ return p; }).then(function (v){ return v; }).catch(function (e){ console.warn("call failed:", e&&e.message); return fallback; }); }

  function renderAll() {
    // apply group filter to the loaded device set, then render every tab
    var devices = filterByGroup(cache.allDevices);
    cache.devices = devices;
    renderHealth(devices, cache.odoMap, cache.faultMap, cache.oilMap, cache.sensorMap);
    if (oilEl) renderOil(devices, cache.odoMap, cache.oilMap, cache.sensorMap);
    if (customEl) renderCustom(devices, cache.odoMap, cache.customList);
  }

  function reloadAll() {
    if (!healthEl) return;
    healthEl.innerHTML = '<div style="text-align:center; color:'+C.soft+'; padding:56px 20px;">Loading fleet…</div>';
    Promise.all([ safe(getDevices(), []), safe(getGroups(), []) ]).then(function (r) {
      cache.allDevices = r[0];
      populateGroupSelect();
      var devices = cache.allDevices; // load data for ALL devices; filter at render time
      return Promise.all([ safe(getOdometers(devices),{}), safe(getFaults(devices),{}), safe(getOilState(),{}), safe(getSensors(devices),{}), safe(getCustom(),[]), safe(getGlobalSettings(),{settingsKey:"global",defaultEmailTo:null}), safe(getFuelLevels(devices),{}) ]);
    }).then(function (res) {
      cache.odoMap = res[0]; cache.faultMap = res[1]; cache.oilMap = res[2]; cache.sensorMap = res[3]; cache.customList = res[4]; globalSettings = res[5] || globalSettings;
      var fuelMap = res[6] || {};
      // merge dedicated fuel readings into the sensor map so the detail panel uses them
      Object.keys(fuelMap).forEach(function (id){
        if (!cache.sensorMap[id]) cache.sensorMap[id] = {};
        cache.sensorMap[id].fuel = fuelMap[id];
      });
      return safe(resolveDiagnostics(cache.faultMap), undefined);
    }).then(function () {
      renderAll();
    }).catch(function (err) {
      if (healthEl) healthEl.innerHTML = '<div style="text-align:center; color:'+C.soft+'; padding:56px 20px;">Couldn\u2019t load data: '+(err&&err.message?err.message:err)+'</div>';
    });
  }

  return {
    initialize: function (freshApi, state, cb) {
      // Signal ready FIRST so MyGeotab never hangs on a spinner, even if setup below hiccups.
      try { cb && cb(); } catch (e) {}
      try {
        api = freshApi;
        bodyEl = document.getElementById("body"); rootEl = document.getElementById("root");
        healthEl = document.getElementById("health"); oilEl = document.getElementById("oil");
        customEl = document.getElementById("custom");
        groupSelectEl = document.getElementById("groupSelect");
        toastEl = document.getElementById("toast");
        var rb = $("refreshBtn"); if (rb) rb.addEventListener("click", reloadAll);
        var tb = $("themeBtn");
        if (tb) tb.addEventListener("click", function () {
          theme = theme==="dark"?"light":"dark"; applyTheme(); renderAll();
        });
        if (groupSelectEl) groupSelectEl.addEventListener("change", function () {
          selectedGroupId = groupSelectEl.value || null;
          renderAll();
        });
        document.querySelectorAll("#tabs button").forEach(function (b) {
          b.addEventListener("click", function () { switchTab(b.getAttribute("data-tab")); });
        });
        applyTheme();
      } catch (e) { console.warn("init setup error:", e && e.message); }
    },
    focus: function (freshApi) { api = freshApi; try { applyTheme(); } catch(e){} reloadAll(); },
    blur: function () {}
  };
};
</script>
</body>
</html>
