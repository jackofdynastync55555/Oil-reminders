name: Oil Change Reminders

on:
  schedule:
    # 11:00 UTC = 6:00/7:00 AM Eastern, every day
    - cron: "0 11 * * *"
  workflow_dispatch: {} # lets you run it manually from the Actions tab for testing

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install nodemailer

      - name: Run reminder check
        env:
          # Shared email settings
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}

          # Database 1
          DB1_DATABASE: ${{ secrets.DB1_DATABASE }}
          DB1_USER: ${{ secrets.DB1_USER }}
          DB1_PASSWORD: ${{ secrets.DB1_PASSWORD }}
          DB1_EMAILTO: ${{ secrets.DB1_EMAILTO }}
          DB1_LABEL: ${{ secrets.DB1_LABEL }}

          # Database 2
          DB2_DATABASE: ${{ secrets.DB2_DATABASE }}
          DB2_USER: ${{ secrets.DB2_USER }}
          DB2_PASSWORD: ${{ secrets.DB2_PASSWORD }}
          DB2_EMAILTO: ${{ secrets.DB2_EMAILTO }}
          DB2_LABEL: ${{ secrets.DB2_LABEL }}

          # Database 3 (add secrets when you onboard another customer)
          DB3_DATABASE: ${{ secrets.DB3_DATABASE }}
          DB3_USER: ${{ secrets.DB3_USER }}
          DB3_PASSWORD: ${{ secrets.DB3_PASSWORD }}
          DB3_EMAILTO: ${{ secrets.DB3_EMAILTO }}
          DB3_LABEL: ${{ secrets.DB3_LABEL }}
        run: node scripts/check-oil-reminders.js
